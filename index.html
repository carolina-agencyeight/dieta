<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema de Cocina</title>
<style>
:root {
  --bg: #0d1117; --surface: #161b22; --surface2: #21262d; --border: #30363d;
  --text: #c9d1d9; --dim: #8b949e; --green: #3fb950; --yellow: #d29922;
  --red: #f85149; --orange: #db6d28; --blue: #58a6ff; --r: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5; }

/* HEADER */
.hdr { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 20px; display: flex; align-items: center; gap: 16px; position: sticky; top: 0; z-index: 100; }
.logo { font-size: 15px; font-weight: 700; padding: 14px 0; white-space: nowrap; }
.tabs { display: flex; gap: 2px; flex: 1; }
.tb { background: none; border: none; border-bottom: 2px solid transparent; color: var(--dim); cursor: pointer; font-size: 13px; padding: 14px 14px; transition: color .15s; white-space: nowrap; }
.tb:hover { color: var(--text); }
.tb.on { color: var(--blue); border-bottom-color: var(--blue); }
.hdr-actions { display: flex; gap: 8px; padding: 8px 0; }

/* LAYOUT */
main { padding: 20px; max-width: 1100px; margin: 0 auto; }
.panel { display: none; }
.panel.on { display: block; }

/* BUTTONS */
.btn { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--r); color: var(--text); cursor: pointer; font-size: 12px; padding: 6px 12px; transition: background .15s; white-space: nowrap; }
.btn:hover { background: var(--border); }
.btn-blue { background: var(--blue); border-color: var(--blue); color: #000; font-weight: 600; }
.btn-blue:hover { background: #79c0ff; border-color: #79c0ff; }
.btn-green { background: var(--green); border-color: var(--green); color: #000; font-weight: 600; }
.btn-green:hover { opacity: .85; }
.btn-red { color: var(--red); }
.btn-red:hover { background: rgba(248,81,73,.15); }

/* BANNERS */
.banner { border-radius: var(--r); padding: 10px 14px; margin-bottom: 14px; font-size: 13px; }
.banner-stale { background: rgba(88,166,255,.08); border: 1px solid rgba(88,166,255,.3); color: var(--blue); }
.banner-warn { background: rgba(219,109,40,.08); border: 1px solid rgba(219,109,40,.4); }
.banner-warn h3 { font-size: 12px; font-weight: 700; color: var(--orange); margin-bottom: 6px; }
.banner-crit { background: rgba(248,81,73,.08); border: 1px solid rgba(248,81,73,.4); }
.banner-crit h3 { font-size: 12px; font-weight: 700; color: var(--red); margin-bottom: 6px; }
.chips { display: flex; flex-wrap: wrap; gap: 5px; }
.chip { background: rgba(255,255,255,.06); padding: 2px 8px; border-radius: 12px; font-size: 11px; cursor: pointer; }
.chip:hover { background: rgba(255,255,255,.12); }

/* TOOLBAR */
.toolbar { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; align-items: center; }
.search { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--r); color: var(--text); font-size: 13px; padding: 6px 12px; flex: 1; min-width: 180px; }
.search:focus { outline: none; border-color: var(--blue); }

/* INVENTORY */
.inv-block { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); margin-bottom: 10px; overflow: hidden; }
.inv-hdr { padding: 10px 14px; background: var(--surface2); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; cursor: pointer; user-select: none; }
.inv-hdr:hover { background: var(--border); }
.inv-hdr-left { display: flex; align-items: center; gap: 10px; font-size: 13px; font-weight: 600; }
.inv-body { overflow-x: auto; }
table.inv { width: 100%; border-collapse: collapse; }
table.inv th { text-align: left; padding: 7px 12px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: var(--dim); border-bottom: 1px solid var(--border); white-space: nowrap; }
table.inv th[onclick] { cursor: pointer; user-select: none; }
table.inv th[onclick]:hover { color: var(--text); }
table.inv th.sort-active { color: var(--blue); }
table.inv td { padding: 5px 10px; border-bottom: 1px solid var(--border); vertical-align: middle; }
/* Sticky first column */
table.inv th:first-child { position: sticky; left: 0; z-index: 2; background: var(--surface2); box-shadow: 2px 0 6px rgba(0,0,0,.35); }
table.inv td:first-child { position: sticky; left: 0; z-index: 1; background: var(--surface); box-shadow: 2px 0 6px rgba(0,0,0,.35); }
table.inv tr.row-exp-soon td:first-child { background: #1e1b15; }
table.inv tr.row-exp-past td:first-child { background: #1d1517; }
table.inv tr:last-child td { border-bottom: none; }
table.inv tr:hover td { background: rgba(255,255,255,.02); }
table.inv tr.row-exp-soon td { background: rgba(219,109,40,.07); }
table.inv tr.row-exp-past td { background: rgba(248,81,73,.07); }
.item-name { font-size: 13px; }
.item-name.hidden { display: none; }
.item-qty { color: var(--dim); font-size: 12px; white-space: nowrap; }

/* STATUS BADGE */
.sb { display: inline-block; padding: 2px 9px; border-radius: 12px; font-size: 11px; font-weight: 700; cursor: pointer; user-select: none; white-space: nowrap; }
.sb:hover { opacity: .8; }
.sb.g { background: rgba(63,185,80,.15); color: var(--green); border: 1px solid rgba(63,185,80,.3); }
.sb.y { background: rgba(210,153,34,.15); color: var(--yellow); border: 1px solid rgba(210,153,34,.35); }
.sb.r { background: rgba(248,81,73,.15); color: var(--red); border: 1px solid rgba(248,81,73,.3); }

/* EXPIRY LABEL */
.exp { display: inline-block; font-size: 10px; padding: 1px 6px; border-radius: 4px; white-space: nowrap; }
.exp-past { background: rgba(248,81,73,.2); color: var(--red); font-weight: 600; }
.exp-today { background: rgba(219,109,40,.3); color: var(--orange); font-weight: 600; }
.exp-soon { background: rgba(219,109,40,.15); color: var(--orange); }
.exp-ok { color: var(--dim); }

/* INLINE EDIT */
.ie { background: var(--surface2); border: 1px solid var(--blue); border-radius: 4px; color: var(--text); font-size: 12px; padding: 3px 6px; width: 100%; min-width: 80px; }
.ie:focus { outline: none; }
.ie-date { min-width: 120px; }

/* PLAN TAB */
.plan-hdr { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
.week-lbl { font-size: 15px; font-weight: 600; min-width: 230px; text-align: center; }
.plan-wrap { overflow-x: auto; }
table.plan { width: 100%; border-collapse: collapse; min-width: 700px; }
table.plan th { padding: 8px; text-align: center; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--dim); background: var(--surface2); border: 1px solid var(--border); }
table.plan td { border: 1px solid var(--border); padding: 6px 8px; vertical-align: top; width: 13%; }
table.plan td.slot-lbl { background: var(--surface2); font-size: 11px; font-weight: 700; color: var(--dim); text-transform: uppercase; letter-spacing: .04em; white-space: nowrap; width: 9%; text-align: right; padding-right: 10px; position: sticky; left: 0; z-index: 2; box-shadow: 2px 0 6px rgba(0,0,0,.35); }
table.plan th.slot-lbl-hdr { position: sticky; left: 0; z-index: 3; background: var(--surface2); box-shadow: 2px 0 6px rgba(0,0,0,.35); }
.meal-cell { min-height: 38px; cursor: pointer; border-radius: 4px; padding: 3px; }
.meal-cell:hover { background: rgba(255,255,255,.05); }
.meal-cell.empty { display: flex; align-items: center; justify-content: center; color: var(--border); font-size: 20px; }
.meal-cell.empty:hover { color: var(--dim); }
.meal-nm { font-size: 12px; font-weight: 500; line-height: 1.3; }
.meal-ing { font-size: 10px; color: var(--dim); margin-top: 2px; }
.meal-cell.gen { background: rgba(88,166,255,.07); }
.meal-cell.uses-exp { background: rgba(219,109,40,.1); }
.meal-cell.issues { background: rgba(248,81,73,.13); border: 1px solid rgba(248,81,73,.22); }
.meal-cell.prepared { opacity: .5; }
.meal-cell.prepared .meal-nm { text-decoration: line-through; }
.meal-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 4px; min-height: 18px; }
.meal-issues-badge { font-size: 10px; color: var(--red); }
.prep-btn { background: rgba(63,185,80,.15); border: 1px solid rgba(63,185,80,.35); border-radius: 3px; color: var(--green); cursor: pointer; font-size: 10px; font-weight: 700; line-height: 1.4; padding: 1px 6px; white-space: nowrap; }
.prep-btn:hover { background: rgba(63,185,80,.3); }
.ing-list { list-style: none; font-size: 12px; padding: 0; }
.ing-list li { padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,.04); display: flex; align-items: center; gap: 7px; }
.ing-list li:last-child { border-bottom: none; }
.day-th.done { color: var(--green); text-decoration: line-through; }

/* SHOPPING */
.shop-sect { margin-bottom: 22px; }
.shop-sect h2 { font-size: 13px; font-weight: 700; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 6px; }
.shop-item { display: flex; align-items: center; gap: 10px; padding: 6px 4px; border-bottom: 1px solid rgba(255,255,255,.04); }
.shop-item:last-child { border-bottom: none; }
.shop-item label { cursor: pointer; font-size: 13px; flex: 1; }
.shop-item.chk label { text-decoration: line-through; color: var(--dim); }
.shop-item input[type=checkbox] { width: 14px; height: 14px; cursor: pointer; accent-color: var(--green); flex-shrink: 0; }
.shop-meta { font-size: 11px; color: var(--dim); }
.shop-empty { color: var(--dim); font-size: 13px; font-style: italic; padding: 8px 4px; }

/* RECIPES */
.rcat { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
.rcat-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; color: var(--dim); cursor: pointer; font-size: 12px; padding: 5px 14px; transition: all .15s; white-space: nowrap; }
.rcat-btn:hover { color: var(--text); }
.rcat-btn.on { background: var(--blue); border-color: var(--blue); color: #000; font-weight: 600; }
.rec-toolbar { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; align-items: center; }
.recipes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
/* Category pills (multi-select) */
.cat-pills { display: flex; flex-wrap: wrap; gap: 8px; }
.cat-pill { display: inline-flex; align-items: center; gap: 5px; background: var(--surface2); border: 2px solid var(--border); border-radius: 20px; color: var(--dim); cursor: pointer; font-size: 13px; padding: 8px 14px; transition: all .15s; user-select: none; min-height: 40px; }
.cat-pill:hover { border-color: var(--blue); color: var(--text); }
.cat-pill.sel { background: var(--blue); border-color: var(--blue); color: #000; font-weight: 600; }
.cat-pill input[type=checkbox] { display: none; }
.rcard { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; }
.rcard-hdr { padding: 12px 16px; background: var(--surface2); cursor: pointer; user-select: none; }
.rcard-hdr:hover { background: var(--border); }
.rcard-hdr h3 { font-size: 13px; font-weight: 600; }
.rcard-meta { font-size: 11px; color: var(--dim); margin-top: 3px; }
.rcard-body { padding: 14px 16px; display: none; }
.rcard-body.on { display: block; }
.rcard-body h4 { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--dim); margin: 12px 0 5px; }
.rcard-body h4:first-child { margin-top: 0; }
.rcard-body ul, .rcard-body ol { padding-left: 16px; font-size: 13px; }
.rcard-body li { margin-bottom: 3px; }
.rcard-body .note { font-size: 11px; color: var(--dim); margin-top: 8px; font-style: italic; }

/* MODAL */
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.75); z-index: 200; align-items: center; justify-content: center; }
.overlay.on { display: flex; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 22px; width: 460px; max-width: 96vw; max-height: 85vh; overflow-y: auto; position: relative; }
.modal h2 { font-size: 16px; font-weight: 700; margin-bottom: 16px; padding-right: 28px; }
.modal-x { position: absolute; top: 12px; right: 12px; background: none; border: none; color: var(--dim); cursor: pointer; font-size: 18px; line-height: 1; padding: 4px 7px; border-radius: 4px; }
.modal-x:hover { color: var(--text); background: var(--border); }
.fg { margin-bottom: 12px; }
.fg label { display: block; font-size: 11px; color: var(--dim); margin-bottom: 4px; text-transform: uppercase; letter-spacing: .05em; }
.fg input, .fg select, .fg textarea { background: var(--surface2); border: 1px solid var(--border); border-radius: 5px; color: var(--text); font-size: 13px; padding: 7px 10px; width: 100%; font-family: inherit; }
.fg input:focus, .fg select:focus, .fg textarea:focus { outline: none; border-color: var(--blue); }
.fg textarea { min-height: 70px; resize: vertical; }
.modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; border-top: 1px solid var(--border); padding-top: 14px; }
.fg-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

/* SOURCE TABS (add recipe modal) */
.src-tab { background: var(--surface2); border: none; color: var(--dim); cursor: pointer; flex: 1; font-size: 13px; padding: 9px; transition: all .15s; }
.src-tab:hover { color: var(--text); background: var(--border); }
.src-tab.on { background: var(--blue); color: #000; font-weight: 600; }
.src-badge { display: inline-block; font-size: 10px; padding: 1px 6px; border-radius: 4px; background: rgba(88,166,255,.15); color: var(--blue); margin-left: 4px; vertical-align: middle; }

/* EXPORT OPTIONS */
.export-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
.export-opt { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--r); color: var(--text); cursor: pointer; padding: 16px 12px; text-align: center; transition: border-color .15s, background .15s; }
.export-opt:hover { border-color: var(--blue); background: var(--border); }
.export-icon { font-size: 26px; margin-bottom: 6px; }
.export-lbl { font-size: 13px; font-weight: 600; margin-bottom: 3px; }
.export-desc { font-size: 11px; color: var(--dim); line-height: 1.3; }

@media (max-width: 640px) {
  main { padding: 12px; }
  /* Header: tabs scroll, sync button shrinks to dot only */
  .hdr { padding: 0 10px; gap: 4px; }
  .logo { font-size: 13px; }
  .tabs { overflow-x: auto; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
  .tabs::-webkit-scrollbar { display: none; }
  .tb { padding: 12px 10px; font-size: 12px; flex-shrink: 0; }
  #sync-label { display: none; }
  .sync-btn { padding: 5px 8px; flex-shrink: 0; }
  .fg-row { grid-template-columns: 1fr; }
  .export-grid { grid-template-columns: 1fr 1fr; }
}
/* SYNC */
.sync-btn { background: none; border: 1px solid var(--border); border-radius: 20px; color: var(--dim); cursor: pointer; font-size: 11px; padding: 4px 12px; white-space: nowrap; display: flex; align-items: center; gap: 5px; transition: all .15s; }
.sync-btn:hover { border-color: var(--blue); color: var(--blue); }
.sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--dim); flex-shrink: 0; }
.sync-dot.ok { background: var(--green); }
.sync-dot.syncing { background: var(--yellow); animation: pulse .8s infinite; }
.sync-dot.error { background: var(--red); }
.sync-dot.off { background: var(--dim); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
</style>
</head>

<div class="hdr">
  <div class="logo">🥗 Cocina</div>
  <nav class="tabs">

    <button class="tb" onclick="TAB('mercado')">🛒 Mercado</button>
    <button class="tb" onclick="TAB('recetas')">📖 Recetas</button>
  </nav>
  <button class="sync-btn" onclick="openSyncConfig()" id="sync-btn">
    <span class="sync-dot off" id="sync-dot"></span>
    <span id="sync-label">☁️ Sync</span>
  </button>
</div>

<main>

</main>

<div id="overlay" class="overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal-body"></div>
</div>

function save() {
  try { localStorage.setItem('cocina_v2', JSON.stringify(S)); } catch(e){}
  schedulePush();
}

function load() {
  try {
    const raw = localStorage.getItem('cocina_v2');
    if (raw) { Object.assign(S, JSON.parse(raw)); return; }
  } catch(e) {}
  // First run — seed
  S.inv = SEED_INV.map(x => ({...x}));
  S.curWeek = getMonday(new Date());
}

function uid() { return '_' + Math.random().toString(36).slice(2,9); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// Returns all recipes with edits applied; custom recipes included last
function getAllRecipes() {
  const base = [...RECIPES, ...PLAN_RECIPES];
  return [
    ...base.map(r => { const e = (S.recipeEdits||{})[r.id]; return e ? {...r, ...e} : r; }),
    ...(S.customRecipes||[])
  ];
}
// Returns effective categories for a recipe (supports multi-cat)
function recCats(r) { return r.cats && r.cats.length ? r.cats : [r.cat]; }

// Build pill-style multi-category selector HTML
function buildCatPills(selectedCats, prefix='rp') {
  const cats = ['ayuno','desayuno','mediaMañana','almuerzo','merienda','cena'];
  return `<div class="cat-pills">` + cats.map(c => {
    const sel = selectedCats.includes(c);
    // Use <label for=id> — browser toggles checkbox automatically on click;
    // onchange then syncs the visual .sel class. No manual toggling needed.
    return `<label class="cat-pill${sel?' sel':''}" for="${prefix}-${c}">
      <input type="checkbox" id="${prefix}-${c}" ${sel?'checked':''} onchange="this.closest('.cat-pill').classList.toggle('sel',this.checked)">
      ${CAT_LABELS[c]}
    </label>`;
  }).join('') + `</div>`;
}
function readCatPills(prefix='rp') {
  return ['ayuno','desayuno','mediaMañana','almuerzo','merienda','cena']
    .filter(c => document.getElementById(prefix+'-'+c)?.checked);
}

// Score a recipe by inventory availability (only 🟢/🟡 count; 🔴 = not available)
function recipeAvailScore(rec) {
  let avail = 0, missing = 0;
  (rec.ing||[]).forEach(ing => {
    const item = findInvMatch(ing);
    if (!item || item.s === 'r') missing++;
    else avail++;
  });
  return avail - missing * 2;
}

function getMonday(d) {
  const dt = new Date(d);
  const day = dt.getDay(); // 0=Sun
  const diff = day === 0 ? -6 : 1 - day;
  dt.setDate(dt.getDate() + diff);
  return fmtDate(dt);
}

function fmtDate(d) {
  const dt = typeof d === 'string' ? new Date(d+'T00:00:00') : new Date(d);
  return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0');
}

function addDays(dateStr, n) {
  const d = new Date(dateStr+'T00:00:00');
  d.setDate(d.getDate() + n);
  return fmtDate(d);
}

function displayShort(dateStr) { // "Lun 06/04"
  const d = new Date(dateStr+'T00:00:00');
  const days = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  return days[d.getDay()]+' '+String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0');
}

function displayWeek(mon) {
  const sun = addDays(mon, 6);
  const dm = new Date(mon+'T00:00:00'), ds = new Date(sun+'T00:00:00');
  const months = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  return `${dm.getDate()} ${months[dm.getMonth()]} – ${ds.getDate()} ${months[ds.getMonth()]} ${ds.getFullYear()}`;
}

function today() {
  return fmtDate(new Date());
}

function expiryInfo(item) {
  if (!item.e) return null;
  const now = new Date(); now.setHours(0,0,0,0);
  const exp = new Date(item.e+'T00:00:00');
  const days = Math.round((exp - now) / 86400000);
  if (days < 0) return { cls:'exp-past', label:`Venció hace ${-days}d` };
  if (days === 0) return { cls:'exp-today', label:'Vence hoy ⚠️' };
  const thresh = item.sec === 'despensa' ? 7 : 3;
  if (days <= thresh) return { cls:'exp-soon', label:`Vence en ${days}d` };
  return { cls:'exp-ok', label: item.e };
}

function statusClass(s) { return s==='g'?'g':s==='y'?'y':'r'; }
function statusLabel(s) { return s==='g'?'🟢 Lleno':s==='y'?'🟡 Medio':'🔴 Bajo'; }
function cycleStatus(s) { return s==='g'?'y':s==='y'?'r':'g'; }

function TAB(t) {
  S.tab = t;
  document.querySelectorAll('.tb').forEach(b => b.classList.toggle('on', b.textContent.toLowerCase().includes(t.slice(0,4))));
  document.querySelectorAll('.panel').forEach(p => p.classList.toggle('on', p.id === 'p-'+t));
  render();
}

function render() {
  if (S.tab === 'inventario') renderInventory();
  else if (S.tab === 'plan') renderPlan();
  else if (S.tab === 'mercado') renderMercado();
  else if (S.tab === 'recetas') renderRecetas();
}

function thSort(label, key) {
  const active = S.invSort?.key === key;
  const arrow = active ? (S.invSort.dir === 1 ? ' ▲' : ' ▼') : '';
  return `<th class="${active?'sort-active':''}" onclick="setSort('${key}')">${label}${arrow}</th>`;
}

function setSort(key) {
  if (!S.invSort) S.invSort = { key, dir: 1 };
  else if (S.invSort.key === key) S.invSort.dir *= -1;
  else { S.invSort.key = key; S.invSort.dir = 1; }
  renderInvSections();
}

function sortItems(items) {
  if (!S.invSort) return items;
  const { key, dir } = S.invSort;
  const statusOrder = { g: 0, y: 1, r: 2 };
  return [...items].sort((a, b) => {
    let av, bv;
    if (key === 'e') {
      av = a.e ? new Date(a.e).getTime() : Infinity;
      bv = b.e ? new Date(b.e).getTime() : Infinity;
    } else if (key === 's') {
      av = statusOrder[a.s] ?? 0;
      bv = statusOrder[b.s] ?? 0;
    } else {
      av = (a[key] || '').toLowerCase();
      bv = (b[key] || '').toLowerCase();
    }
    return av < bv ? -dir : av > bv ? dir : 0;
  });
}

function renderInventory() {
  const el = document.getElementById('p-inventario');
  const now = new Date(); now.setHours(0,0,0,0);

  // Build expiry alerts
  const expPast = S.inv.filter(i => { if(!i.e) return false; const d=new Date(i.e+'T00:00:00'); return d<now; });
  const expSoon = S.inv.filter(i => {
    if(!i.e) return false;
    const d=new Date(i.e+'T00:00:00'); const days=Math.round((d-now)/86400000);
    const thresh = i.sec==='despensa'?7:3;
    return days>=0 && days<=thresh;
  });

  let html = '';

  // Stale banner
  if (S.invLastUpdated) {
    const staleDays = Math.round((now - new Date(S.invLastUpdated)) / 86400000);
    if (staleDays > 15) {
      html += `<div class="banner banner-stale">ℹ️ El inventario no se ha editado en <strong>${staleDays} días</strong>. ¿Todo sigue igual?</div>`;
    }
  }

  // Expiry banners
  if (expPast.length) {
    html += `<div class="banner banner-crit"><h3>🗑️ Vencidos (${expPast.length})</h3><div class="chips">${expPast.map(i=>`<span class="chip" onclick="jumpToItem('${i.id}')">${esc(i.n)}</span>`).join('')}</div></div>`;
  }
  if (expSoon.length) {
    html += `<div class="banner banner-warn"><h3>⚠️ Próximos a vencer (${expSoon.length})</h3><div class="chips">${expSoon.map(i=>`<span class="chip" onclick="jumpToItem('${i.id}')">${esc(i.n)} · ${expiryInfo(i).label}</span>`).join('')}</div></div>`;
  }

  // Toolbar
  html += `<div class="toolbar">
    <input class="search" type="text" placeholder="Buscar artículo…" value="${esc(S.search)}" oninput="onSearchInput(this)">
    <button class="btn btn-blue" onclick="openAddItem('congelador')">+ Añadir artículo</button>
    <button class="btn btn-green" onclick="openExportInventory()">📤 Exportar inventario</button>
  </div>
  <div id="inv-sections"></div>`;

  el.innerHTML = html;
  renderInvSections();
}

function onSearchInput(el) {
  S.search = el.value;
  renderInvSections();
}

function renderInvSections() {
  const container = document.getElementById('inv-sections');
  if (!container) return;
  const q = S.search.toLowerCase();
  let html = '';

  for (const sec of SECTIONS) {
    const items = S.inv.filter(i => i.sec === sec && (!q || i.n.toLowerCase().includes(q)));
    const collapsed = S.collapsed[sec];
    const redCount = items.filter(i=>i.s==='r').length;

    html += `<div class="inv-block">
      <div class="inv-hdr" onclick="toggleSec('${sec}')">
        <div class="inv-hdr-left">
          <span>${SEC_LABELS[sec]}</span>
          <span style="color:var(--dim);font-weight:400">${items.length} artículos</span>
          ${redCount ? `<span style="color:var(--red);font-size:11px">${redCount} bajos</span>` : ''}
        </div>
        <span style="color:var(--dim);font-size:12px">${collapsed?'▶':'▼'}</span>
      </div>`;

    if (!collapsed) {
      html += `<div class="inv-body"><table class="inv">
        <thead><tr>
          ${thSort('Artículo','n')}${thSort('Cantidad','q')}${thSort('Estado','s')}${thSort('Vence','e')}${thSort('Nota','t')}<th></th>
        </tr></thead><tbody>`;

      for (const item of sortItems(items)) {
        const ei = expiryInfo(item);
        let rowCls = '';
        if (ei && ei.cls === 'exp-past') rowCls = 'row-exp-past';
        else if (ei && (ei.cls === 'exp-today' || ei.cls === 'exp-soon')) rowCls = 'row-exp-soon';

        const expHtml = ei
          ? `<span class="exp ${ei.cls}">${esc(ei.label)}</span>`
          : `<span class="exp exp-ok">—</span>`;

        html += `<tr class="${rowCls}" id="row-${item.id}">
          <td class="item-name">${esc(item.n)}</td>
          <td class="item-qty">${esc(item.q||'—')}</td>
          <td><span class="sb ${statusClass(item.s)}" onclick="cycleItemStatus('${item.id}')" title="Clic para cambiar">${statusLabel(item.s)}</span></td>
          <td>${expHtml}</td>
          <td style="color:var(--dim);font-size:12px;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(item.t||'')}</td>
          <td><button class="btn" style="padding:3px 8px;font-size:11px" onclick="openEditItem('${item.id}')">Editar</button></td>
        </tr>`;
      }

      if (!items.length) {
        html += `<tr><td colspan="6" style="color:var(--dim);font-size:12px;padding:12px">Sin resultados${q?' para "'+esc(q)+'"':''}</td></tr>`;
      }

      html += `</tbody></table></div>`;
    }
    html += `</div>`;
  }

  container.innerHTML = html;
}

function toggleSec(sec) { S.collapsed[sec] = !S.collapsed[sec]; renderInvSections(); }

function touchInv() { S.invLastUpdated = new Date().toISOString(); }

function cycleItemStatus(id) {
  const item = S.inv.find(i => i.id===id);
  if (!item) return;
  item.s = cycleStatus(item.s);
  touchInv(); save();
  renderInventory();
  // Also refresh mercado if visible
  if (S.tab === 'mercado') renderMercado();
}

function jumpToItem(id) {
  const row = document.getElementById('row-'+id);
  if (row) { row.scrollIntoView({behavior:'smooth', block:'center'}); row.style.outline='2px solid var(--blue)'; setTimeout(()=>row.style.outline='',1500); }
}

function getWeekPlan(mon) {
  if (!S.plans[mon]) {
    S.plans[mon] = Array.from({length:7}, (_,i) => ({
      date: addDays(mon, i),
      done: false,
      meals: {ayuno:null,desayuno:null,mediaMañana:null,almuerzo:null,merienda:null,cena:null}
    }));
  }
  return S.plans[mon];
}

function renderPlan() {
  if (!S.curWeek) S.curWeek = getMonday(new Date());
  const plan = getWeekPlan(S.curWeek);
  const todayStr = today();
  const el = document.getElementById('p-plan');

  let html = `<div class="plan-hdr">
    <div class="week-nav">
      <button class="btn" onclick="prevWeek()">◀</button>
      <div class="week-lbl">${displayWeek(S.curWeek)}</div>
      <button class="btn" onclick="nextWeek()">▶</button>
    </div>
    <button class="btn" onclick="goToday()">Hoy</button>
    <button class="btn btn-green" onclick="generatePlan()">✨ Generar semana</button>
    <button class="btn" onclick="clearPlan()">Limpiar</button>
    <button class="btn" onclick="openExportPlan()">📤 Exportar plan</button>
  </div>
  <p style="color:var(--dim);font-size:12px;margin-bottom:14px">Clic en la celda para editar. Botón <strong style="color:var(--green)">✓ Preparar</strong> descuenta los ingredientes del inventario. Fondo <span style="color:var(--red)">rojo</span> = faltan ingredientes.</p>
  <div class="plan-wrap"><table class="plan">
  <thead><tr><th class="slot-lbl-hdr" style="text-align:right;padding-right:10px">Momento</th>`;

  plan.forEach(day => {
    const isToday = day.date === todayStr;
    html += `<th class="day-th ${day.done?'done':''}" style="${isToday?'color:var(--blue)':''}">
      <div>${displayShort(day.date)}</div>
      <div style="margin-top:3px">
        <span class="sb ${day.done?'g':'y'}" style="cursor:pointer;font-size:10px" onclick="toggleDone('${S.curWeek}',${plan.indexOf(day)})">${day.done?'✅ Hecho':'⬜ Pendiente'}</span>
      </div>
    </th>`;
  });
  html += `</tr></thead><tbody>`;

  for (const mk of MEAL_KEYS) {
    html += `<tr><td class="slot-lbl">${MEAL_LABELS[mk]}</td>`;
    plan.forEach((day, di) => {
      const meal = day.meals[mk];
      if (meal) {
        const chk = checkMealIngredients(meal);
        const issueCount = chk ? chk.missing.length + chk.low.length : 0;
        let cellCls = meal.prepared ? 'prepared' : issueCount > 0 ? 'issues' : meal.usesExp ? 'uses-exp' : 'gen';
        html += `<td>
          <div class="meal-cell ${cellCls}" onclick="openMealEdit('${S.curWeek}',${di},'${mk}')">
            <div class="meal-nm">${esc(meal.name)}</div>
            ${meal.notes ? `<div class="meal-ing">${esc(meal.notes)}</div>` : ''}
            <div class="meal-footer">
              <span class="meal-issues-badge">${meal.prepared ? '✅' : issueCount > 0 ? `⚠️ ${issueCount} falta${issueCount>1?'n':''}` : ''}</span>
              ${!meal.prepared && meal.recipeId ? `<button class="prep-btn" onclick="event.stopPropagation();openQuickPrep('${S.curWeek}',${di},'${mk}')">✓ Preparar</button>` : ''}
            </div>
          </div>
        </td>`;
      } else {
        html += `<td onclick="openMealEdit('${S.curWeek}',${di},'${mk}')"><div class="meal-cell empty">+</div></td>`;
      }
    });
    html += `</tr>`;
  }

  html += `</tbody></table></div>`;
  el.innerHTML = html;
}

function prevWeek() { S.curWeek = addDays(S.curWeek, -7); save(); renderPlan(); }
function nextWeek() { S.curWeek = addDays(S.curWeek, 7); save(); renderPlan(); }
function goToday() { S.curWeek = getMonday(new Date()); save(); renderPlan(); }

function toggleDone(mon, di) {
  const plan = getWeekPlan(mon);
  plan[di].done = !plan[di].done;
  save(); renderPlan();
}

function clearPlan() {
  if (!confirm('¿Borrar todo el plan de esta semana?')) return;
  delete S.plans[S.curWeek];
  save(); renderPlan();
}

function openMealEdit(mon, di, mk) {
  const plan = getWeekPlan(mon);
  const day = plan[di];
  const meal = day.meals[mk];
  const recs = getAllRecipes().filter(r => r.cat === mk);
  const chk = meal ? checkMealIngredients(meal) : null;

  let recOpts = `<option value="">— Sin comida —</option>`;
  recs.forEach(r => {
    const sel = meal && meal.recipeId === r.id ? 'selected' : '';
    recOpts += `<option value="${r.id}" ${sel}>${esc(r.name)}</option>`;
  });

  let ingHtml = '';
  if (chk) {
    ingHtml = `<div class="fg"><label>Ingredientes en inventario</label><ul class="ing-list">`;
    chk.ok.forEach(i      => ingHtml += `<li><span>✅</span><span>${esc(i)}</span></li>`);
    chk.low.forEach(i     => ingHtml += `<li><span>⚠️</span><span style="color:var(--yellow)">${esc(i)}</span><span style="color:var(--dim);font-size:11px">— 🔴 Bajo</span></li>`);
    chk.missing.forEach(i => ingHtml += `<li><span>❌</span><span style="color:var(--red)">${esc(i)}</span><span style="color:var(--dim);font-size:11px">— No en inventario</span></li>`);
    ingHtml += `</ul></div>`;
    if (chk.missing.length || chk.low.length) {
      window._pendingMissing = chk.missing;
      ingHtml += `<button class="btn" style="margin-bottom:12px;width:100%" onclick="addMissingToInventory()">➕ Agregar faltantes al inventario como 🔴</button>`;
    }
  }

  // Store recipe list for "suggest another" cycling
  window._mealEditRecs = recs;
  window._mealEditCat = mk;

  openModal(`<h2>${MEAL_LABELS[mk]} · ${displayShort(day.date)}</h2>
    <div class="fg"><label>Receta guardada</label>
      <div style="display:flex;gap:6px;align-items:center">
        <select id="me-rid" onchange="prefillMealName()" style="flex:1">${recOpts}</select>
        <button class="btn" style="white-space:nowrap;flex-shrink:0" onclick="suggestAnotherRecipe()" title="Sugerir otra receta del recetario">🔀 Otra</button>
      </div>
    </div>
    <div class="fg"><label>O escribe el nombre del plato</label>
      <input id="me-name" type="text" value="${esc(meal?meal.name:'')}" placeholder="Nombre libre…">
    </div>
    <div class="fg"><label>Notas / ingredientes clave</label>
      <textarea id="me-notes" placeholder="Opcional">${esc(meal?meal.notes||'':'')}</textarea>
    </div>
    ${ingHtml}
    <div class="modal-footer" style="flex-wrap:wrap">
      ${meal ? `<button class="btn btn-red" onclick="clearMeal('${mon}',${di},'${mk}')">Quitar</button>` : ''}
      ${meal?.recipeId && !meal?.prepared ? `<button class="btn btn-green" onclick="openQuickPrep('${mon}',${di},'${mk}')">✅ Marcar preparada</button>` : ''}
      ${meal?.prepared ? `<button class="btn" onclick="unmarkPrepared('${mon}',${di},'${mk}')">↩️ Desmarcar</button>` : ''}
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-blue" onclick="saveMeal('${mon}',${di},'${mk}')">Guardar</button>
    </div>`);
}

function prefillMealName() {
  const rid = document.getElementById('me-rid').value;
  if (!rid) return;
  const rec = getAllRecipes().find(r => r.id===rid);
  if (rec) {
    document.getElementById('me-name').value = rec.name;
    if (document.getElementById('me-notes') && !document.getElementById('me-notes').value) {
      document.getElementById('me-notes').value = rec.ing.slice(0,4).join(', ');
    }
  }
}

function suggestAnotherRecipe() {
  const recs = window._mealEditRecs || [];
  if (!recs.length) return;
  const sel = document.getElementById('me-rid');
  const currentId = sel ? sel.value : '';
  // Score and shuffle, pick one different from current
  const now = new Date(); now.setHours(0,0,0,0);
  const others = recs.filter(r => r.id !== currentId);
  if (!others.length) return;
  // Pick random from top half (by inventory score) for quality
  const scored = others.map(r => {
    let score = 0;
    r.ing.forEach(ing => {
      const item = findInvMatch(ing);
      if (item) score += item.s === 'g' ? 2 : item.s === 'y' ? 1 : 0;
    });
    return {...r, score};
  }).sort((a,b) => b.score - a.score);
  const topN = Math.max(1, Math.ceil(scored.length / 2));
  const pick = scored[Math.floor(Math.random() * topN)];
  if (sel) sel.value = pick.id;
  const nameEl = document.getElementById('me-name');
  if (nameEl) nameEl.value = pick.name;
  const notesEl = document.getElementById('me-notes');
  if (notesEl) notesEl.value = pick.ing.slice(0,4).join(', ');
}

function saveMeal(mon, di, mk) {
  const plan = getWeekPlan(mon);
  const name = document.getElementById('me-name').value.trim();
  const rid = document.getElementById('me-rid').value;
  const notes = document.getElementById('me-notes').value.trim();
  if (!name) { plan[di].meals[mk] = null; }
  else { plan[di].meals[mk] = { name, recipeId: rid||null, notes }; }
  save(); closeModal(); renderPlan();
}

function clearMeal(mon, di, mk) {
  const plan = getWeekPlan(mon);
  plan[di].meals[mk] = null;
  save(); closeModal(); renderPlan();
}

// ─── PREPARE MEAL ────────────────────────────
function openQuickPrep(mon, di, mk) {
  const plan = getWeekPlan(mon);
  const meal = plan[di].meals[mk];
  if (!meal) return;
  const chk = checkMealIngredients(meal);
  const rec = chk?.recipe;

  let ingRows = '';
  if (rec) {
    rec.ing.forEach(ing => {
      const item = findInvMatch(ing);
      if (!item) {
        ingRows += `<li><span>❌</span><span style="color:var(--red)">${esc(ing)}</span><span style="color:var(--dim);font-size:11px">No en inventario</span></li>`;
      } else if (item.s === 'r') {
        ingRows += `<li><span>⚠️</span><span style="color:var(--yellow)">${esc(ing)}</span><span style="color:var(--dim);font-size:11px">Ya en 🔴 Bajo — no cambia</span></li>`;
      } else if (isBulkItem(item.n)) {
        const uses = (S.bulkUses||{})[item.id] || 0;
        const remaining = BULK_USES_THRESHOLD - uses - 1;
        ingRows += `<li><span>🫙</span><span>${esc(ing)}</span><span style="color:var(--dim);font-size:11px">A granel — baja nivel en ${remaining} uso${remaining===1?'':'s'} más</span></li>`;
      } else {
        ingRows += `<li><span>✅</span><span>${esc(ing)}</span><span style="color:var(--dim);font-size:11px">${statusLabel(item.s)} → ${statusLabel(cycleStatus(item.s))}</span></li>`;
      }
    });
  }

  let missingNote = '';
  if (chk?.missing.length) {
    window._pendingMissing = chk.missing;
    missingNote = `<div style="background:rgba(248,81,73,.1);border:1px solid rgba(248,81,73,.25);border-radius:6px;padding:10px;margin:12px 0;font-size:12px">
      <strong style="color:var(--red)">❌ Sin inventario: ${chk.missing.map(i=>esc(i)).join(', ')}</strong>
      <br><button class="btn" style="margin-top:8px;font-size:11px" onclick="addMissingToInventory()">➕ Agregar al inventario como 🔴</button>
    </div>`;
  }

  openModal(`<h2>✅ Preparar: ${esc(meal.name)}</h2>
    <p style="color:var(--dim);font-size:12px;margin-bottom:10px">Al confirmar, se actualizará el inventario:</p>
    ${rec ? `<ul class="ing-list">${ingRows}</ul>` : '<p style="color:var(--dim);font-size:12px">Sin receta vinculada — no se modifica el inventario.</p>'}
    ${missingNote}
    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-green" onclick="confirmPrep('${mon}',${di},'${mk}')">✅ Confirmar preparada</button>
    </div>`);
}

function confirmPrep(mon, di, mk) {
  const plan = getWeekPlan(mon);
  const meal = plan[di].meals[mk];
  if (!meal) return;
  const chk = checkMealIngredients(meal);
  if (chk?.recipe) {
    chk.recipe.ing.forEach(ing => {
      const item = findInvMatch(ing);
      if (!item || item.s === 'r') return;
      if (isBulkItem(item.n)) {
        useBulkItem(item); // slow deduction for bulk items
      } else {
        item.s = cycleStatus(item.s);
      }
    });
    touchInv();
  }
  meal.prepared = true;
  save(); closeModal(); renderPlan();
  showToast('✅ Preparada — inventario actualizado');
}

function unmarkPrepared(mon, di, mk) {
  const plan = getWeekPlan(mon);
  const meal = plan[di].meals[mk];
  if (meal) { meal.prepared = false; save(); closeModal(); renderPlan(); }
}

function addMissingToInventory() {
  const items = window._pendingMissing || [];
  if (!items.length) return;
  let added = 0;
  items.forEach(name => {
    const existing = findInvMatch(name);
    if (existing) { existing.s = 'r'; }
    else { S.inv.push({ id: uid(), n: name, q: '—', s: 'r', e: null, t: 'Falta para receta', sec: 'nevera' }); added++; }
  });
  touchInv(); save();
  showToast(`➕ Ingredientes agregados al inventario como 🔴`);
  renderInvSections();
}

// ─── BULK ITEMS ──────────────────────────────
// Items that last many uses before depleting a tier
const BULK_KEYWORDS = ['ghee','mantequilla','pasta de ajo','aceite','condimento','sal ','sal rosada','pimienta','orégano','comino','canela','curry','cayenne','maggi','vinagre','miel','italian seasoning','complete seasoning'];
const BULK_USES_THRESHOLD = 5; // uses before tier drops

function isBulkItem(itemName) {
  const n = itemName.toLowerCase();
  return BULK_KEYWORDS.some(k => n.includes(k));
}

function useBulkItem(item) {
  if (!S.bulkUses) S.bulkUses = {};
  const count = (S.bulkUses[item.id] || 0) + 1;
  S.bulkUses[item.id] = count;
  if (count >= BULK_USES_THRESHOLD) {
    S.bulkUses[item.id] = 0; // reset counter
    if (item.s !== 'r') item.s = cycleStatus(item.s);
  }
  // show toast if getting low
  if (count === BULK_USES_THRESHOLD - 1 && item.s !== 'r') {
    showToast(`⚠️ ${item.n}: 1 uso más para bajar de nivel`);
  }
}

// ─── GENERATE PLAN ───────────────────────────
// Strip quantities/units from an ingredient string to get just the item name
function stripIngQuantity(raw) {
  let s = raw.toLowerCase().trim();
  s = s.replace(/^\d[\d/.,\s]*(cups?|tbsp?|tsp?|tablespoons?|teaspoons?|oz\.?|g|kg|ml|l\b|lbs?|lb|pounds?|pinch(es)?|squeeze|handful|bunch|cloves?|slices?|pieces?|cans?|jars?|stalks?)\s*(of\s+)?/i, '');
  s = s.replace(/^(a\s+)?(pinch|squeeze|handful|bunch|slice|piece|can|jar|stalk)\s+(of\s+)?/i, '');
  s = s.replace(/^\d+[\d/.,]?\s+/, '');
  s = s.replace(/\(.*?\)/g, '');
  s = s.replace(/\b(fresh|dried|frozen|chopped|minced|sliced|diced|grated|ground|whole|raw|cooked|peeled|pitted|rinsed|drained|softened|melted|room\s+temperature|to\s+taste|optional)\b/gi, '');
  // Take only first option when ingredient lists alternatives: "ron blanco o claro" → "ron blanco"
  s = s.replace(/\s+o\s+.+$/, '');
  s = s.replace(/^[,;\s]+|[,;\s]+$/g, '').replace(/\s{2,}/g, ' ').trim();
  return s || raw.toLowerCase().trim();
}

// Returns best inventory match for an ingredient name, or null if no confident match.
// Returns the highest-scoring item; requires score ≥ 30 to count.
function findInvMatch(ingName) {
  const ing = stripIngQuantity(ingName);
  if (!ing || ing.length < 2) return null;

  let best = null, bestScore = 0;

  for (const item of S.inv) {
    const nm = item.n.toLowerCase().trim();
    if (!nm || nm.length < 2) continue;

    let score = 0;
    if (nm === ing) {
      score = 100; // exact
    } else if (ing.length >= 4 && nm.startsWith(ing)) {
      // Inventory item starts with ingredient name (e.g. "piña" → "piña natural")
      // Penalise if the suffix is " de X" (different product entirely: leche ≠ leche de avena)
      const suffix = nm.slice(ing.length);
      score = /^\s+de\s/.test(suffix) ? 20 : 80;
    } else if (nm.length >= 4 && ing.startsWith(nm)) {
      // Ingredient starts with inventory name (e.g. "piña fresca" recipe → "piña" in inventory)
      const suffix = ing.slice(nm.length);
      score = /^\s+de\s/.test(suffix) ? 20 : 60;
    } else {
      // Word-level: ALL significant words (≥5 chars) of the SHORTER side must appear in the longer
      const ingW = ing.split(/[\s,\/]+/).filter(w => w.length >= 5);
      const nmW  = nm.split(/[\s,\/]+/).filter(w => w.length >= 5);
      if (ingW.length >= 1 && nmW.length >= 1) {
        const [shorter, longer] = ingW.length <= nmW.length ? [ingW, nmW] : [nmW, ingW];
        const matched = shorter.filter(sw => longer.some(lw => lw === sw)).length;
        if (matched === shorter.length) score = 30; // all words of shorter side found
      }
    }

    if (score > bestScore) { bestScore = score; best = item; }
  }

  return bestScore >= 30 ? best : null;
}

function checkMealIngredients(meal) {
  if (!meal?.recipeId) return null;
  const rec = getAllRecipes().find(r => r.id === meal.recipeId);
  if (!rec) return null;
  const missing = [], low = [], ok = [];
  rec.ing.forEach(ing => {
    const item = findInvMatch(ing);
    if (!item) missing.push(ing);
    else if (item.s === 'r') low.push(ing);
    else ok.push(ing);
  });
  return { missing, low, ok, recipe: rec };
}

function generatePlan() {
  const now = new Date(); now.setHours(0,0,0,0);

  function findItem(ingName) { return findInvMatch(ingName); }

  function scoreRecipe(rec) {
    let score = 10;
    for (const ing of rec.ing) {
      const item = findItem(ing);
      if (!item) continue;
      if (item.s === 'r') score -= 3;
      else if (item.s === 'y') score += 1;
      else score += 2;
      if (item.e) {
        const d = new Date(item.e+'T00:00:00');
        const days = Math.round((d - now) / 86400000);
        if (days >= 0 && days <= 7) score += 8;
        if (days >= 0 && days <= 2) score += 8;
      }
    }
    return score;
  }

  function usesExpiring(rec) {
    for (const ing of rec.ing) {
      const item = findItem(ing);
      if (item && item.e) {
        const d = new Date(item.e+'T00:00:00');
        const days = Math.round((d - now) / 86400000);
        if (days >= 0 && days <= 7) return true;
      }
    }
    return false;
  }

  function best(cat) {
    const pool = getAllRecipes().filter(r => recCats(r).includes(cat));
    const scored = pool.map(r => ({...r, score: scoreRecipe(r)})).sort((a,b) => b.score-a.score);
    const good = scored.filter(r => r.score > 4);
    return good.length ? good : scored; // fallback to all if none score high enough
  }

  // Fisher-Yates shuffle
  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length-1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i+1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  const pools = {};
  for (const mk of MEAL_KEYS) pools[mk] = best(mk);

  const plan = getWeekPlan(S.curWeek);
  const days = plan.length; // typically 7

  // For fruit categories, pick 2-3 options and rotate through the week
  const FRUIT_CATS = ['mediaMañana', 'merienda'];
  const weekFruits = {}; // { cat: [rec, rec, rec] }
  for (const fc of FRUIT_CATS) {
    const pool = pools[fc];
    if (!pool.length) continue;
    // Pick 2-3 different fruits (up to pool size)
    const numFruits = Math.min(pool.length, Math.random() < 0.5 ? 2 : 3);
    weekFruits[fc] = shuffle(pool).slice(0, numFruits);
  }

  // Build shuffled rotation for non-fruit categories
  const rotations = {};
  for (const mk of MEAL_KEYS) {
    if (FRUIT_CATS.includes(mk)) continue;
    const pool = pools[mk];
    if (!pool.length) continue;
    // Repeat pool enough times to cover all days, then shuffle
    const repeated = [];
    while (repeated.length < days) repeated.push(...pool);
    rotations[mk] = shuffle(repeated.slice(0, days));
  }

  plan.forEach((day, di) => {
    for (const mk of MEAL_KEYS) {
      // Skip prepared meals — never overwrite
      if (day.meals[mk]?.prepared) continue;

      if (FRUIT_CATS.includes(mk)) {
        const fruits = weekFruits[mk];
        if (fruits?.length) {
          const rec = fruits[di % fruits.length]; // rotate through selected fruits
          day.meals[mk] = {
            name: rec.name,
            recipeId: rec.id,
            notes: rec.ing.slice(0,4).join(', '),
            usesExp: usesExpiring(rec)
          };
        }
      } else {
        const rot = rotations[mk];
        if (!rot) continue;
        const rec = rot[di];
        day.meals[mk] = {
          name: rec.name,
          recipeId: rec.id,
          notes: rec.ing.slice(0,4).join(', '),
          usesExp: usesExpiring(rec)
        };
      }
    }
  });

  save(); renderPlan();
  showToast('✨ Semana generada con recetas mezcladas');
}

function renderMercado() {
  const el = document.getElementById('p-mercado');
  const now = new Date(); now.setHours(0,0,0,0);

  const urgent = S.inv.filter(i => i.s === 'r');
  const expiring = S.inv.filter(i => {
    if (i.s === 'r' || !i.e) return false;
    const d = new Date(i.e+'T00:00:00');
    const days = Math.round((d - now) / 86400000);
    return days >= 0 && days <= 7;
  }).sort((a,b) => new Date(a.e) - new Date(b.e));
  const optional = S.inv.filter(i => i.s === 'y' && !expiring.includes(i));

  function listItems(items, prefix) {
    if (!items.length) return `<div class="shop-empty">Ninguno</div>`;
    return items.map(item => {
      const key = prefix + item.id;
      const chk = S.shopChk[key];
      const expI = item.e ? expiryInfo(item) : null;
      const meta = [
        item.q && item.q !== '—' ? `<span class="shop-meta">🔢 ${esc(item.q)}</span>` : '',
        `<span class="shop-meta">${SEC_LABELS[item.sec]}</span>`,
        expI ? `<span class="exp ${expI.cls}">${expI.label}</span>` : '',
        item.t ? `<span class="shop-meta" style="color:var(--dim);font-style:italic">· ${esc(item.t)}</span>` : '',
      ].filter(Boolean).join(' ');
      return `<div class="shop-item ${chk?'chk':''}">
        <input type="checkbox" id="chk-${key}" ${chk?'checked':''} onchange="toggleShopChk('${key}','${item.id}')">
        <label for="chk-${key}">${esc(item.n)}</label>
        <div style="display:flex;gap:5px;align-items:center;flex-wrap:wrap;font-size:11px">${meta}</div>
      </div>`;
    }).join('');
  }

  let html = `<div class="toolbar">
    <button class="btn btn-blue" onclick="renderMercado()">🔄 Actualizar</button>
    <button class="btn" onclick="clearShopChk()">Desmarcar todo</button>
    <button class="btn btn-green" onclick="openExportModal()">📤 Exportar lista</button>
    <button class="btn" onclick="openPlanShoppingList()">📅 Del plan esta semana</button>
  </div>
  <div class="shop-sect">
    <h2>🔴 Urgente — Bajo o agotado (${urgent.length})</h2>
    ${listItems(urgent,'u')}
  </div>
  <div class="shop-sect">
    <h2>⚠️ Por vencer esta semana (${expiring.length})</h2>
    ${listItems(expiring,'e')}
  </div>
  <div class="shop-sect">
    <h2>🟡 Opcionales — En medio (${optional.length})</h2>
    ${listItems(optional,'o')}
  </div>`;

  el.innerHTML = html;
}

function toggleShopChk(key, itemId) {
  const wasChecked = S.shopChk[key];
  S.shopChk[key] = !wasChecked;
  // When checking (marking as purchased) → update inventory to green
  if (!wasChecked && itemId) {
    const item = S.inv.find(i => i.id === itemId);
    if (item) { item.s = 'g'; touchInv(); }
  }
  save();
  renderMercado();
}

function clearShopChk() { S.shopChk = {}; save(); renderMercado(); }

function openPlanShoppingList() {
  const week = S.plans[S.curWeek] || {};
  const allRecs = getAllRecipes();
  const missing = {}, low = {};

  Object.values(week).forEach(dayMeals => {
    if (!dayMeals) return;
    Object.values(dayMeals).forEach(meal => {
      if (!meal?.recipeId) return;
      const rec = allRecs.find(r => r.id === meal.recipeId);
      if (!rec) return;
      (rec.ing||[]).forEach(ing => {
        const item = findInvMatch(ing);
        if (!item) {
          const key = ing.toLowerCase().trim();
          if (!missing[key]) missing[key] = ing;
        } else if (item.s === 'r') {
          if (!low[item.id]) low[item.id] = item;
        }
      });
    });
  });

  const missingList = Object.values(missing);
  const lowList = Object.values(low);

  if (!missingList.length && !lowList.length) {
    openModal(`<h2>📅 Lista del plan esta semana</h2>
      <p style="color:var(--green);margin:16px 0">✅ ¡Todo lo necesario está en tu inventario!</p>
      <div class="modal-footer"><button class="btn" onclick="closeModal()">Cerrar</button></div>`);
    return;
  }

  const weekLabel = S.curWeek ? new Date(S.curWeek+'T00:00:00').toLocaleDateString('es', {day:'numeric',month:'short'}) : '';

  openModal(`<h2>📅 Compras del plan — semana del ${weekLabel}</h2>
    ${missingList.length ? `
    <div style="margin-bottom:14px">
      <div style="font-size:12px;font-weight:700;color:var(--red);margin-bottom:6px">✕ No en inventario (${missingList.length})</div>
      ${missingList.map(i=>`<div style="padding:5px 0;border-bottom:1px solid var(--border);font-size:13px">${esc(i)}</div>`).join('')}
    </div>` : ''}
    ${lowList.length ? `
    <div style="margin-bottom:14px">
      <div style="font-size:12px;font-weight:700;color:var(--orange);margin-bottom:6px">🔴 Bajo en inventario (${lowList.length})</div>
      ${lowList.map(i=>`<div style="padding:5px 0;border-bottom:1px solid var(--border);font-size:13px">${esc(i.n)}${i.q&&i.q!=='—'?` <span style="color:var(--dim);font-size:11px">(${esc(i.q)})</span>`:''}</div>`).join('')}
    </div>` : ''}
    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">Cerrar</button>
      <button class="btn btn-blue" onclick="copyPlanShoppingList()">📋 Copiar lista</button>
    </div>`);

  // Store for copy
  window._planShopMissing = missingList;
  window._planShopLow = lowList;
}

function copyPlanShoppingList() {
  const lines = [];
  if (window._planShopMissing?.length) {
    lines.push('✕ Falta comprar:');
    window._planShopMissing.forEach(i => lines.push('  ' + i));
  }
  if (window._planShopLow?.length) {
    lines.push('🔴 Reabastecer:');
    window._planShopLow.forEach(i => lines.push('  ' + i.n));
  }
  navigator.clipboard?.writeText(lines.join('\n')).then(() => showToast('✅ Lista copiada'));
}

// ─── EXPORT ─────────────────────────────────
function buildShoppingText() {
  const now = new Date(); now.setHours(0,0,0,0);
  const urgent   = S.inv.filter(i => i.s === 'r');
  const expiring = S.inv.filter(i => {
    if (i.s==='r'||!i.e) return false;
    const d=new Date(i.e+'T00:00:00'); const days=Math.round((d-now)/86400000);
    return days>=0 && days<=7;
  }).sort((a,b)=>new Date(a.e)-new Date(b.e));
  const optional = S.inv.filter(i => i.s==='y' && !expiring.find(x=>x.id===i.id));
  const date = new Date().toLocaleDateString('es-CO',{day:'2-digit',month:'long',year:'numeric'});
  let t = `🛒 Lista de Mercado — ${date}\n`;
  if (urgent.length) {
    t += `\n🔴 URGENTE\n`;
    urgent.forEach(i => {
      const detail = [i.q&&i.q!=='—'?i.q:'', i.t].filter(Boolean).join(' · ');
      t += `${i.n}${detail?' ('+detail+')':''}\n`;
    });
  }
  if (expiring.length) {
    t += `\n⚠️ POR VENCER\n`;
    expiring.forEach(i => {
      const detail = [i.q&&i.q!=='—'?i.q:'', i.t, `vence ${i.e}`].filter(Boolean).join(' · ');
      t += `${i.n} (${detail})\n`;
    });
  }
  if (optional.length) {
    t += `\n🟡 OPCIONALES\n`;
    optional.forEach(i => {
      const detail = [i.q&&i.q!=='—'?i.q:'', i.t].filter(Boolean).join(' · ');
      t += `${i.n}${detail?' ('+detail+')':''}\n`;
    });
  }
  return t.trim();
}

function buildShoppingCSV() {
  const now = new Date(); now.setHours(0,0,0,0);
  const urgent   = S.inv.filter(i=>i.s==='r').map(i=>({...i,cat:'Urgente'}));
  const expiring = S.inv.filter(i=>{
    if(i.s==='r'||!i.e) return false;
    const d=new Date(i.e+'T00:00:00'); return Math.round((d-now)/86400000)<=7 && d>=now;
  }).map(i=>({...i,cat:'Por vencer'}));
  const optional = S.inv.filter(i=>i.s==='y'&&!expiring.find(x=>x.id===i.id)).map(i=>({...i,cat:'Opcional'}));
  let csv = 'Artículo,Sección,Categoría,Fecha vencimiento\n';
  [...urgent,...expiring,...optional].forEach(i=>{
    csv+=`"${i.n}","${SEC_LABELS[i.sec].replace(/[^\w\sáéíóúñÁÉÍÓÚÑ]/g,'').trim()}","${i.cat}","${i.e||''}"\n`;
  });
  return csv;
}

function exportCSV() {

  const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `mercado_${fmtDate(new Date())}.csv`;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);

function showToast(msg, undoFn) {
  document.querySelectorAll('.toast-el').forEach(el => el.remove());
  const t = document.createElement('div');
  t.className = 'toast-el';
  t.style.cssText = 'position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border);color:var(--text);padding:9px 18px;border-radius:20px;font-size:13px;font-weight:600;z-index:400;box-shadow:0 4px 16px rgba(0,0,0,.5);display:flex;align-items:center;gap:10px;white-space:nowrap';
  t.innerHTML = `<span>${msg}</span>`;
  if (undoFn) {
    const btn = document.createElement('button');
    btn.textContent = 'Deshacer';
    btn.style.cssText = 'background:var(--blue);border:none;border-radius:10px;color:#000;font-size:12px;font-weight:700;padding:3px 10px;cursor:pointer';
    btn.onclick = () => { undoFn(); t.remove(); };
    t.appendChild(btn);
  }
  document.body.appendChild(t);
  const timer = setTimeout(()=>{ t.style.transition='opacity .4s'; t.style.opacity='0'; setTimeout(()=>t.remove(),400); }, undoFn ? 4000 : 2200);
  if (undoFn) t.querySelector('button').addEventListener('click', () => clearTimeout(timer));
}

// Partial render: only updates the cards grid. Call on search/sort/toggle.
function renderRecetasGrid() {
  const gridEl = document.getElementById('recetas-grid');
  if (!gridEl) return;

  const q = (S.recSearch||'').toLowerCase().trim();
  const hidden = S.hiddenRecipes || {};
  const allRecipes = getAllRecipes().filter(r => !hidden[r.id]);

  let filtered = S.recCat === 'todas'
    ? allRecipes
    : allRecipes.filter(r => recCats(r).includes(S.recCat));

  if (q) {
    filtered = filtered.filter(r =>
      r.name.toLowerCase().includes(q) ||
      (r.ing||[]).some(i => i.toLowerCase().includes(q)) ||
      (r.steps||[]).some(s => s.toLowerCase().includes(q)) ||
      recCats(r).some(c => (CAT_LABELS[c]||'').toLowerCase().includes(q))
    );
  }

  if (S.recSort === 'alpha') {
    filtered = [...filtered].sort((a,b) => a.name.localeCompare(b.name, 'es'));
  } else {
    filtered = [...filtered].sort((a,b) => {
      const sa = recipeAvailScore(a), sb = recipeAvailScore(b);
      return sb - sa || a.name.localeCompare(b.name, 'es');
    });
  }

  let html = '';
  filtered.forEach(rec => {
    const isOpen = S.recOpen && S.recOpen[rec.id];
    const isCustom = !!(S.customRecipes||[]).find(r => r.id === rec.id);
    const hasEdits = !!(S.recipeEdits||{})[rec.id];
    const srcBadge = isCustom && rec.source ? `<span class="src-badge">${rec.source==='foto'?'📷 Foto':rec.source==='link'?'🔗 Link':rec.source==='plan'?'📅 Plan':'✏️ Texto'}</span>` : (rec.source==='plan'?'<span class="src-badge">📅 Plan</span>':'');
    const editBadge = hasEdits ? '<span class="src-badge" style="background:rgba(63,185,80,.15);color:var(--green)">✏️ editada</span>' : '';
    const allCats = recCats(rec);
    const catBadges = allCats.map(c => `<span class="src-badge" style="background:rgba(88,166,255,.12);color:var(--blue)">${CAT_LABELS[c]||c}</span>`).join('');
    // Delete/reset buttons for all recipe types
    const deleteBtn = isCustom
      ? `<button class="btn btn-red" style="padding:2px 7px;font-size:11px" onclick="event.stopPropagation();deleteCustomRecipe('${rec.id}')">✕</button>`
      : `<button class="btn btn-red" style="padding:2px 7px;font-size:11px" onclick="event.stopPropagation();hideRecipe('${rec.id}')" title="Ocultar receta">✕</button>`;
    const resetBtn = hasEdits
      ? `<button class="btn" style="padding:2px 7px;font-size:11px;color:var(--dim)" onclick="event.stopPropagation();resetRecipeEdits('${rec.id}')" title="Restaurar cambios">↩️</button>`
      : '';
    html += `<div class="rcard">
      <div class="rcard-hdr" onclick="toggleRec('${rec.id}')">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:6px">
          <div>
            <h3>${esc(rec.name)}${srcBadge}${editBadge}${catBadges}</h3>
            <div class="rcard-meta">⏱ ${esc(rec.time||'—')} · 🍽 ${rec.srv||1} porción${(rec.srv||1)>1?'es':''}</div>
          </div>
          <div style="display:flex;gap:4px;flex-shrink:0;margin-top:1px">
            <button class="btn" style="padding:2px 7px;font-size:11px" onclick="event.stopPropagation();openEditRecipe('${rec.id}')">✏️</button>
            ${resetBtn}${deleteBtn}
          </div>
        </div>
      </div>
      <div class="rcard-body ${isOpen?'on':''}">
        ${rec.imageData ? `<img src="${rec.imageData}" style="width:100%;border-radius:5px;margin-bottom:12px;max-height:220px;object-fit:cover">` : ''}
        ${rec.url ? `<div style="font-size:11px;margin-bottom:10px"><a href="${esc(rec.url)}" target="_blank" style="color:var(--blue)">🔗 Ver receta original</a></div>` : ''}
        <h4>Ingredientes</h4>
        <ul>${(rec.ing||[]).map(i => {
          const inv = findInvMatch(i);
          const dot = inv ? (inv.s==='g'?'<span style="color:var(--green);font-size:10px">🟢</span>':inv.s==='y'?'<span style="color:var(--yellow);font-size:10px">🟡</span>':'<span style="color:var(--red);font-size:10px">🔴</span>') : '<span style="color:var(--dim);font-size:10px">✕</span>';
          return `<li style="display:flex;gap:5px;align-items:baseline">${dot}<span>${esc(i)}</span></li>`;
        }).join('')}</ul>
        ${(rec.qty||[]).length ? `<details style="margin:4px 0 10px;font-size:12px"><summary style="cursor:pointer;color:var(--dim);list-style:none;display:flex;align-items:center;gap:5px"><span style="font-size:10px">▶</span> Ver cantidades (${rec.qty.length})</summary><ul style="margin-top:6px;padding-left:16px">${rec.qty.map(q=>`<li style="color:var(--dim)">${esc(q)}</li>`).join('')}</ul></details>` : ''}
        <h4>Preparación</h4>
        <ol>${(rec.steps||[]).map(s=>`<li>${esc(s)}</li>`).join('')}</ol>
        ${rec.note ? `<div class="note">⚠️ ${esc(rec.note)}</div>` : ''}
      </div>
    </div>`;
  });

  if (!filtered.length) {
    html = `<div style="color:var(--dim);font-size:13px;padding:8px 0">
      ${q ? `Sin resultados para "<strong>${esc(q)}</strong>". Prueba otra búsqueda.` : 'Sin recetas para esta categoría. ¡Agrega la primera!'}
    </div>`;
  }
  gridEl.innerHTML = html;
}

  if (S.hiddenRecipes) delete S.hiddenRecipes[id];

  else openHiddenRecipes();
}

function switchSrc(src) {
  ['foto','link','texto'].forEach(s => {
    const btn = document.getElementById('src-'+s);
    const panel = document.getElementById('src-'+s+'-panel');
    if (btn) btn.classList.toggle('on', s === src);
    if (panel) panel.style.display = s === src ? '' : 'none';
  });
  window._recSrc = src;
}

function previewImg(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const preview = document.getElementById('rec-img-preview');
    preview.src = e.target.result;
    preview.style.display = 'block';
    resizeImage(e.target.result, 900, data => { window._recImgData = data; });
  };
  reader.readAsDataURL(file);
}

function resizeImage(dataUrl, maxW, cb) {
  const img = new Image();
  img.onload = () => {
    const canvas = document.createElement('canvas');
    const scale = Math.min(1, maxW / img.width);
    canvas.width = Math.round(img.width * scale);
    canvas.height = Math.round(img.height * scale);
    canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
    cb(canvas.toDataURL('image/jpeg', 0.78));
  };
  img.src = dataUrl;
}

function parseAndFill() {
  const raw = (document.getElementById('rec-rawtext').value || '').trim();
  if (!raw) return;
  const lines = raw.split('\n').map(l => l.trim()).filter(l => l);
  let name = '', ings = [], steps = [], mode = 'header';

  for (const line of lines) {
    const ll = line.toLowerCase().trim();
    // Skip metadata lines (English recipe cards)
    if (/^(course|cuisine|servings?|calories?|yield|total time|prep time|cook time|author|difficulty|rating)\b/.test(ll)) continue;
    // Section headers (Spanish + English)
    if (/^(ingredientes?|ingredients?):?\s*$/.test(ll)) { mode = 'ing'; continue; }
    if (/^(preparaci[oó]n|instrucciones?|pasos?|m[eé]todo|elaboraci[oó]n|instructions?|directions?|method|steps?|how to make):?\s*$/.test(ll)) { mode = 'steps'; continue; }
    // Subsection headers (like "Yogurt Dipping Sauce") — skip lines that are title-case and short
    if (/^[A-ZÁÉÍÓÚ][^a-záéíóú]{5,}/.test(line) && line.length < 60 && !/^[-•*\d]/.test(line) && mode !== 'header') continue;
    if (mode === 'header') {
      if (!name) { name = line.replace(/^#+\s*/, ''); }
      continue;
    }
    const clean = line.replace(/^[-•*]\s*/, '').replace(/^\d+[.)]\s*/, '').trim();
    if (!clean || clean.length < 3) continue;
    if (mode === 'ing') ings.push(clean);
    else if (mode === 'steps') steps.push(clean);
  }

  if (name) document.getElementById('rec-name').value = name;
  if (ings.length) document.getElementById('rec-ing').value = ings.join('\n');
  if (steps.length) document.getElementById('rec-steps').value = steps.join('\n');

  if (!name && !ings.length && !steps.length) {
    alert('No se pudo interpretar el texto. Intenta con el formato:\nNombre\n\nIngredientes:\n- item\n\nPreparación:\n1. paso');
  }
}

async function fetchAndParseLink() {
  const urlEl = document.getElementById('rec-url');
  const statusEl = document.getElementById('link-status');
  const url = urlEl?.value.trim();
  if (!url || !url.startsWith('http')) {
    if (statusEl) statusEl.textContent = '⚠️ Pega una URL válida primero.';
    return;
  }
  if (statusEl) statusEl.innerHTML = '<span style="color:var(--yellow)">⏳ Obteniendo página…</span>';

  // Try multiple CORS proxies in order
  const proxies = [
    `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`,
    `https://corsproxy.io/?${encodeURIComponent(url)}`,
    `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
  ];

  let html = null;
  for (const proxy of proxies) {
    try {
      const res = await fetch(proxy, { signal: AbortSignal.timeout(8000) });
      if (!res.ok) continue;
      const data = await res.text();
      // allorigins wraps in JSON: { "contents": "<html>..." }
      if (proxy.includes('allorigins')) {
        try { html = JSON.parse(data).contents; } catch { html = data; }
      } else {
        html = data;
      }
      if (html && html.includes('<')) break;
    } catch(e) { continue; }
  }

  if (!html) {
    if (statusEl) statusEl.innerHTML = '<span style="color:var(--red)">❌ No se pudo acceder a la página. Copia el texto de la receta en la pestaña ✏️ Texto.</span>';
    return;
  }

  // ── 1. Try JSON-LD structured data (most recipe blogs use this) ──────────
  let filled = false;
  const ldMatches = [...html.matchAll(/<script[^>]+type=["']application\/ld\+json["'][^>]*>([\s\S]*?)<\/script>/gi)];
  for (const m of ldMatches) {
    try {
      let data = JSON.parse(m[1]);
      // Unwrap @graph arrays
      if (data['@graph']) data = data['@graph'].find(x => [].concat(x['@type']||[]).includes('Recipe')) || {};
      if ([].concat(data['@type']||[]).includes('Recipe')) {
        const nameEl   = document.getElementById('rec-name');
        const ingEl    = document.getElementById('rec-ing');
        const stepsEl  = document.getElementById('rec-steps');
        const timeEl   = document.getElementById('rec-time');
        const srvEl    = document.getElementById('rec-srv');
        const noteEl   = document.getElementById('rec-note');
        if (nameEl  && data.name)              nameEl.value  = data.name;
        if (ingEl   && data.recipeIngredient) {
          // qty field gets full strings; ing field gets cleaned names only
          const rawIngs = data.recipeIngredient;
          const qtyEl = document.getElementById('rec-qty');
          if (qtyEl) qtyEl.value = rawIngs.join('\n');
          ingEl.value = rawIngs.map(i => stripIngQuantity(i)).join('\n');
        }
        if (stepsEl && data.recipeInstructions) {
          const steps = [].concat(data.recipeInstructions).map(s =>
            typeof s === 'string' ? s : s.text || s.name || (s.itemListElement||[]).map(x=>x.text||'').join(' ') || ''
          ).filter(Boolean);
          stepsEl.value = steps.join('\n');
        }
        if (timeEl) {
          const t = data.totalTime || data.cookTime || data.prepTime || '';
          // Convert ISO 8601 duration PT1H30M → "1 h 30 min"
          const iso = t.match(/PT(?:(\d+)H)?(?:(\d+)M)?/);
          if (iso) timeEl.value = [iso[1]?iso[1]+' h':'', iso[2]?iso[2]+' min':''].filter(Boolean).join(' ');
          else if (t) timeEl.value = t;
        }
        if (srvEl && data.recipeYield) srvEl.value = parseInt([].concat(data.recipeYield)[0]) || 1;
        if (noteEl && data.description && !noteEl.value) noteEl.value = data.description.slice(0,120);
        filled = true;
        break;
      }
    } catch(e) { continue; }
  }

  // ── 2. Fallback: strip HTML and run text parser ──────────────────────────
  if (!filled) {
    const div = document.createElement('div');
    div.innerHTML = html;
    div.querySelectorAll('script,style,nav,header,footer,aside,iframe').forEach(el => el.remove());
    const text = (div.innerText || div.textContent || '').replace(/\n{3,}/g,'\n\n');
    // Put into the rawtext area and reuse the text parser
    const rtEl = document.getElementById('rec-rawtext');
    if (rtEl) { rtEl.value = text.slice(0, 5000); parseAndFill(); }
  }

  // Title fallback for name
  const nameEl2 = document.getElementById('rec-name');
  if (nameEl2 && !nameEl2.value) {
    const t = html.match(/<title[^>]*>([^<]+)<\/title>/i);
    if (t) nameEl2.value = t[1].trim().split(/[|\-–]/)[0].trim();
  }

  const method = filled ? 'JSON-LD ✓' : 'texto HTML';
  if (statusEl) statusEl.innerHTML = `<span style="color:var(--green)">✅ Receta importada (${method}) — revisa y ajusta los campos.</span>`;
}

function buildRecipeText(cat) {
  const allRecs = getAllRecipes();
  const cats = cat ? [cat] : ['ayuno','desayuno','mediaMañana','almuerzo','merienda','cena'];
  let t = `📖 Recetario${cat ? ' — '+CAT_LABELS[cat] : ''}\n${'─'.repeat(40)}\n`;
  for (const c of cats) {
    const recs = allRecs.filter(r => r.cat === c);
    if (!recs.length) continue;
    t += `\n${CAT_LABELS[c].toUpperCase()}\n${'─'.repeat(20)}\n`;
    recs.forEach(rec => {
      t += `\n${rec.name}\n`;
      if (rec.time && rec.time !== '—') t += `⏱ ${rec.time}  🍽 ${rec.srv||1} porción\n`;
      t += `\nIngredientes:\n${(rec.ing||[]).map(i=>`${i}`).join('\n')}\n`;
      if (rec.steps?.length) t += `\nPreparación:\n${rec.steps.map((s,i)=>`${i+1}. ${s}`).join('\n')}\n`;
      if (rec.note) t += `\n⚠️ ${rec.note}\n`;
      t += '\n';
    });
  }
  return t.trim();
}

// ─── SUGGEST RECIPE FROM INVENTORY ───────────
function openSuggestFromInventory() {
  const now = new Date(); now.setHours(0,0,0,0);
  // Find expiring items (next 7 days) and low items
  const expiring = S.inv.filter(i => {
    if (!i.e) return false;
    const d = new Date(i.e+'T00:00:00');
    const days = Math.round((d - now) / 86400000);
    return days >= 0 && days <= 7;
  });
  const allRecs = getAllRecipes();

  // Score each recipe by how many available inventory items it uses
  // 🔴 Bajo is treated as missing (needs restocking before using)
  const scored = allRecs.map(rec => {
    let score = 0, usesExpiring = false;
    const ingStatus = (rec.ing||[]).map(ing => {
      const item = findInvMatch(ing);
      if (!item) return { ing, status: 'missing' };
      if (item.s === 'r') return { ing, status: 'low', item };  // 🔴 = needs buying, not available
      if (item.s === 'y') { score += 2; return { ing, status: 'ok', item }; }
      score += 3;
      if (expiring.find(e => e.id === item.id)) { score += 5; usesExpiring = true; }
      return { ing, status: 'full', item };
    });
    const missing = ingStatus.filter(i => i.status === 'missing' || i.status === 'low').length;
    score -= missing * 2;
    return { rec, score, usesExpiring, ingStatus, missing };
  }).sort((a,b) => b.score - a.score);

  const top = scored.slice(0, 8);
  const expiringNames = expiring.map(i => i.n).join(', ');

  let cards = top.map(({rec, score, usesExpiring, ingStatus, missing}) => {
    const available = ingStatus.filter(i => i.status === 'full' || i.status === 'ok').length;
    const pct = Math.max(0, Math.min(100, Math.round((available / Math.max(1,ingStatus.length)) * 100)));
    return `<div style="background:var(--surface2);border:1px solid ${usesExpiring?'rgba(219,109,40,.4)':'var(--border)'};border-radius:var(--r);padding:12px;cursor:pointer" onclick="applyInventoryRecipe('${rec.id}')">

        const col = s.status==='missing'?'var(--red)':s.status==='low'?'var(--yellow)':'var(--text)';

async function scrapeBlogLinks() {
  const urlEl = document.getElementById('blog-url');
  const statusEl = document.getElementById('blog-status');
  const linksEl = document.getElementById('blog-links');
  const baseUrl = urlEl?.value.trim();
  if (!baseUrl || !baseUrl.startsWith('http')) {
    if (statusEl) statusEl.innerHTML = '<span style="color:var(--red)">⚠️ Pega una URL válida.</span>';
    return;
  }

  if (statusEl) statusEl.innerHTML = '<span style="color:var(--yellow)">⏳ Buscando recetas en el blog…</span>';
  if (linksEl) linksEl.innerHTML = '';

  // Fetch the page through proxies
  const proxies = [
    `https://api.allorigins.win/get?url=${encodeURIComponent(baseUrl)}`,
    `https://corsproxy.io/?${encodeURIComponent(baseUrl)}`,
    `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(baseUrl)}`,
  ];
  let html = null;
  for (const proxy of proxies) {
    try {
      const res = await fetch(proxy, { signal: AbortSignal.timeout(10000) });
      if (!res.ok) continue;
      const data = await res.text();
      if (proxy.includes('allorigins')) {
        try { html = JSON.parse(data).contents; } catch { html = data; }
      } else { html = data; }
      if (html && html.includes('<')) break;
    } catch { continue; }
  }

  if (!html) {
    if (statusEl) statusEl.innerHTML = '<span style="color:var(--red)">❌ No se pudo acceder al blog. Intenta con una URL diferente.</span>';
    return;
  }

  // Extract links that look like recipe posts
  const origin = new URL(baseUrl).origin;
  const seen = new Set();
  const recipeLinks = [];

  // 1. Try JSON-LD sitelinks / ItemList
  const ldMatches = [...html.matchAll(/<script[^>]+type=["']application\/ld\+json["'][^>]*>([\s\S]*?)<\/script>/gi)];
  for (const m of ldMatches) {
    try {
      let data = JSON.parse(m[1]);
      const items = data['@graph'] || (Array.isArray(data) ? data : [data]);
      for (const item of items) {
        if ([].concat(item['@type']||[]).includes('Recipe') && item.url) {
          if (!seen.has(item.url)) { seen.add(item.url); recipeLinks.push({ url: item.url, name: item.name || item.url }); }
        }
      }
    } catch {}
  }

  // 2. Fallback: find <a href> links that look like recipe pages
  if (recipeLinks.length < 3) {
    const div = document.createElement('div');
    div.innerHTML = html;
    div.querySelectorAll('a[href]').forEach(a => {
      const href = a.href || a.getAttribute('href') || '';
      const text = (a.textContent || '').trim();
      let abs = '';
      try {
        abs = href.startsWith('http') ? href : new URL(href, origin).href;
      } catch { return; }
      // Must be on the same domain, not the root, not a category/tag/page link
      if (!abs.startsWith(origin)) return;
      const path = new URL(abs).pathname;
      if (path === '/' || path.length < 5) return;
      if (/\/(category|tag|page|author|search|feed|wp-|#)/.test(path)) return;
      if (seen.has(abs)) return;
      seen.add(abs);
      if (text.length > 3 && text.length < 120) {
        recipeLinks.push({ url: abs, name: text });
      }
    });
  }

  if (!recipeLinks.length) {
    if (statusEl) statusEl.innerHTML = '<span style="color:var(--red)">😕 No encontramos recetas. Prueba copiar la URL de una receta específica y usa el botón 🔗 Link en "Nueva receta".</span>';
    return;
  }

  if (statusEl) statusEl.innerHTML = `<span style="color:var(--green)">✅ ${recipeLinks.length} receta${recipeLinks.length>1?'s':''} encontrada${recipeLinks.length>1?'s':''}. Toca "Importar" para agregar al recetario.</span>`;

  if (linksEl) {
    linksEl.innerHTML = recipeLinks.slice(0, 40).map((link, i) => `
      <div id="blog-item-${i}" style="display:flex;align-items:center;gap:8px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:8px 10px">
        <div style="flex:1;font-size:12px"><a href="${esc(link.url)}" target="_blank" style="color:var(--blue)">${esc(link.name.slice(0,80))}</a></div>
        <button class="btn btn-green" style="font-size:11px;padding:4px 10px;flex-shrink:0" onclick="importBlogRecipe('${esc(link.url).replace(/'/g,"\\'")}','${esc(link.name.slice(0,60)).replace(/'/g,"\\'")}',${i})">Importar</button>
      </div>`).join('');
  }
}

async function importBlogRecipe(url, fallbackName, idx) {
  const btn = document.querySelector(`#blog-item-${idx} button`);
  if (btn) { btn.textContent = '⏳'; btn.disabled = true; }

  const proxies = [
    `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`,
    `https://corsproxy.io/?${encodeURIComponent(url)}`,
    `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
  ];
  let html = null;
  for (const proxy of proxies) {
    try {
      const res = await fetch(proxy, { signal: AbortSignal.timeout(10000) });
      if (!res.ok) continue;
      const data = await res.text();
      if (proxy.includes('allorigins')) { try { html = JSON.parse(data).contents; } catch { html = data; } }
      else { html = data; }
      if (html && html.includes('<')) break;
    } catch { continue; }
  }

  if (!html) {
    if (btn) { btn.textContent = '❌ Error'; btn.disabled = false; }
    return;
  }

  // Try JSON-LD first
  let rec = null;
  const ldMatches = [...html.matchAll(/<script[^>]+type=["']application\/ld\+json["'][^>]*>([\s\S]*?)<\/script>/gi)];
  for (const m of ldMatches) {
    try {
      let data = JSON.parse(m[1]);
      if (data['@graph']) data = data['@graph'].find(x => [].concat(x['@type']||[]).includes('Recipe')) || {};
      if ([].concat(data['@type']||[]).includes('Recipe')) {
        const steps = [].concat(data.recipeInstructions||[]).map(s =>
          typeof s === 'string' ? s : s.text || s.name || ''
        ).filter(Boolean);
        const timeRaw = data.totalTime || data.cookTime || data.prepTime || '';
        let time = timeRaw;
        const iso = timeRaw.match?.(/PT(?:(\d+)H)?(?:(\d+)M)?/);
        if (iso) time = [iso[1]?iso[1]+' h':'', iso[2]?iso[2]+' min':''].filter(Boolean).join(' ');
        rec = {
          id: uid(), cat: 'almuerzo', cats: [],
          name: data.name || fallbackName,
          time: time || '—',
          srv: parseInt([].concat(data.recipeYield||[])[0]) || 1,
          ing: [].concat(data.recipeIngredient||[]).filter(Boolean),
          steps, note: '',
          source: 'link', url,
        };
        break;
      }
    } catch {}
  }

  // Fallback: basic text extraction
  if (!rec) {
    const titleMatch = html.match(/<title[^>]*>([^<]+)<\/title>/i);
    const name = titleMatch ? titleMatch[1].trim().split(/[|\-–]/)[0].trim() : fallbackName;
    rec = { id: uid(), cat: 'almuerzo', cats: [], name, time: '—', srv: 1, ing: [], steps: [], note: '', source: 'link', url };
  }

  if (!S.customRecipes) S.customRecipes = [];
  S.customRecipes.push(rec);
  save();

  if (btn) { btn.textContent = '✅ Importada'; btn.style.background = 'var(--green)'; btn.style.borderColor = 'var(--green)'; }
  showToast(`✅ "${rec.name.slice(0,30)}" importada — edítala para ajustar categoría`);
}

function buildInvText() {
  const date = new Date().toLocaleDateString('es-CO',{day:'2-digit',month:'long',year:'numeric'});
  let t = `📦 Inventario — ${date}\n`;
  for (const sec of SECTIONS) {
    const items = S.inv.filter(i => i.sec === sec);
    if (!items.length) continue;
    t += `\n${SEC_LABELS[sec]}\n`;
    items.forEach(i => {
      const s = i.s==='g'?'🟢':i.s==='y'?'🟡':'🔴';
      const detail = [i.q&&i.q!=='—'?i.q:'', i.e?`vence ${i.e}`:'', i.t].filter(Boolean).join(' · ');
      t += `${s} ${i.n}${detail?' — '+detail:''}\n`;
    });
  }
  return t.trim();
}

function buildInvCSV() {
  let csv = 'Artículo,Sección,Cantidad,Estado,Fecha vencimiento,Nota\n';
  S.inv.forEach(i => {
    const sLabel = i.s==='g'?'Lleno':i.s==='y'?'Medio':'Bajo';
    csv += `"${i.n}","${SEC_LABELS[i.sec].replace(/[^\w\sáéíóúñÁÉÍÓÚÑ]/g,'').trim()}","${i.q||''}","${sLabel}","${i.e||''}","${i.t||''}"\n`;
  });
  return csv;
}
