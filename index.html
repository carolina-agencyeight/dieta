// SYNC — GitHub Gist
// ─────────────────────────────────────────────
let _syncCfg = null;
let _syncTimer = null;
const GIST_FILE = 'cocina_state.json';

function loadSyncCfg() {
  try { _syncCfg = JSON.parse(localStorage.getItem('cocina_sync') || 'null'); } catch(e) { _syncCfg = null; }
}
function saveSyncCfg(cfg) {
  _syncCfg = cfg;
  localStorage.setItem('cocina_sync', cfg ? JSON.stringify(cfg) : 'null');
}

function setSyncStatus(state, text) {
  const dot = document.getElementById('sync-dot');
  const lbl = document.getElementById('sync-label');
  if (!dot || !lbl) return;
  dot.className = 'sync-dot ' + state;
  lbl.textContent = text || (state === 'ok' ? '☁️ Sincronizado' : state === 'syncing' ? '☁️ Sincronizando…' : state === 'error' ? '⚠️ Error sync' : '☁️ Sync');
}

function schedulePush() {
  if (!_syncCfg) return;
  clearTimeout(_syncTimer);
  _syncTimer = setTimeout(pushToGist, 2500);
}

async function pushToGist() {
  if (!_syncCfg) return;
  setSyncStatus('syncing');
  try {
    const res = await fetch(`https://api.github.com/gists/${_syncCfg.gistId}`, {
      method: 'PATCH',
      headers: { 'Authorization': `token ${_syncCfg.token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ files: { [GIST_FILE]: { content: JSON.stringify(S) } } })
    });
    if (!res.ok) throw new Error(res.status);
    setSyncStatus('ok', '☁️ Guardado');
    setTimeout(() => setSyncStatus('ok', '☁️ Sync'), 3000);
  } catch(e) {
    setSyncStatus('error', '⚠️ Sin guardar');
  }
}

async function pullFromGist(silent) {
  if (!_syncCfg) return;
  if (!silent) setSyncStatus('syncing', '☁️ Descargando…');
  try {
    const res = await fetch(`https://api.github.com/gists/${_syncCfg.gistId}`, {
      headers: { 'Authorization': `token ${_syncCfg.token}` }
    });
    if (!res.ok) throw new Error(res.status);
    const data = await res.json();
    const content = data.files[GIST_FILE]?.content;
    if (content) {
      const remote = JSON.parse(content);
      Object.assign(S, remote);
      try { localStorage.setItem('cocina_v2', JSON.stringify(S)); } catch(e){}
    }
    setSyncStatus('ok', '☁️ Sync');
    return true;
  } catch(e) {
    setSyncStatus('error', '⚠️ Error sync');
    return false;
  }
}

async function createGist(token) {
  const res = await fetch('https://api.github.com/gists', {
    method: 'POST',
    headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({
      description: '🥗 Sistema de Cocina — Estado',
      public: false,
      files: { [GIST_FILE]: { content: JSON.stringify(S) } }
    })
  });
  if (!res.ok) throw new Error('No se pudo crear el Gist. Verifica el token.');
  const data = await res.json();
  return data.id;
}

  const cfg = _syncCfg;
  openModal(`<h2>☁️ Sincronización entre dispositivos</h2>
    <p style="color:var(--dim);font-size:12px;margin-bottom:16px;line-height:1.6">
      Usa un <strong style="color:var(--text)">GitHub Gist privado</strong> como base de datos. Tus cambios se guardan automáticamente y están disponibles en cualquier dispositivo.
    </p>
    <div class="fg">
      <label>Personal Access Token de GitHub</label>
      <input id="sy-token" type="password" placeholder="ghp_xxxxxxxxxxxx" value="${cfg ? '••••••••••••' : ''}">

    <div style="background:var(--surface2);border-radius:var(--r);padding:12px;margin-bottom:12px;font-size:12px;color:var(--dim)">

    </div>

      <button class="btn" onclick="closeModal()">Cancelar</button>

async function doCreateGist() {
  const token = document.getElementById('sy-token').value.trim();
  if (!token || token.startsWith('•')) { alert('Pega tu token de GitHub primero.'); return; }
  const btn = event.target; btn.textContent = 'Creando…'; btn.disabled = true;
  try {
    const id = await createGist(token);
    document.getElementById('sy-gist').value = id;
    btn.textContent = '✅ Gist creado';
  } catch(e) {
    alert(e.message);
    btn.textContent = 'Crear Gist nuevo'; btn.disabled = false;
  }
}

function saveSync() {
  const rawToken = document.getElementById('sy-token').value.trim();
  const gistId = document.getElementById('sy-gist').value.trim();
  if (!gistId) { alert('Falta el Gist ID.'); return; }
  const token = rawToken.startsWith('•') ? _syncCfg?.token : rawToken;
  if (!token) { alert('Pega el token de GitHub.'); return; }
  saveSyncCfg({ token, gistId });
  closeModal();
  setSyncStatus('ok', '☁️ Sync');
  pushToGist();
}

function disconnectSync() {
  if (!confirm('¿Desconectar la sincronización? Tus datos locales no se borran.')) return;
  saveSyncCfg(null);
  closeModal();
  setSyncStatus('off', '☁️ Sync');
}

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
loadSyncCfg();
load();
if (!S.curWeek) S.curWeek = getMonday(new Date());
// Use TAB() so the correct panel gets .on class and is visible on first load
if (_syncCfg) {
  setSyncStatus('syncing', '☁️ Sincronizando…');
  pullFromGist(true).then(() => TAB(S.tab || 'inventario'));
} else {
  TAB(S.tab || 'inventario');
}

// Auto-pull when the user returns to this tab/window
let _lastPull = Date.now();
function maybePull() {
  if (!_syncCfg) return;
  if (Date.now() - _lastPull < 10000) return; // no más de una vez cada 10s
  _lastPull = Date.now();
  pullFromGist(true).then(ok => { if (ok) TAB(S.tab || 'inventario'); });
}
document.addEventListener('visibilitychange', () => { if (!document.hidden) maybePull(); });
window.addEventListener('focus', maybePull);
</script>
</body>
</html>
