<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema de Cocina</title>
<style>
:root {
  --bg: #0d1117; --surface: #161b22; --surface2: #21262d; --border: #30363d;
  --text: #c9d1d9; --dim: #8b949e; --green: #3fb950; --yellow: #d29922;
  --red: #f85149; --orange: #db6d28; --blue: #58a6ff; --r: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5; }

/* HEADER */
.hdr { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 20px; display: flex; align-items: center; gap: 16px; position: sticky; top: 0; z-index: 100; }
.logo { font-size: 15px; font-weight: 700; padding: 14px 0; white-space: nowrap; }
.tabs { display: flex; gap: 2px; flex: 1; }
.tb { background: none; border: none; border-bottom: 2px solid transparent; color: var(--dim); cursor: pointer; font-size: 13px; padding: 14px 14px; transition: color .15s; white-space: nowrap; }
.tb:hover { color: var(--text); }
.tb.on { color: var(--blue); border-bottom-color: var(--blue); }
.hdr-actions { display: flex; gap: 8px; padding: 8px 0; }

/* LAYOUT */
main { padding: 20px; max-width: 1100px; margin: 0 auto; }
.panel { display: none; }
.panel.on { display: block; }

/* BUTTONS */
.btn { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--r); color: var(--text); cursor: pointer; font-size: 12px; padding: 6px 12px; transition: background .15s; white-space: nowrap; }
.btn:hover { background: var(--border); }
.btn-blue { background: var(--blue); border-color: var(--blue); color: #000; font-weight: 600; }
.btn-blue:hover { background: #79c0ff; border-color: #79c0ff; }
.btn-green { background: var(--green); border-color: var(--green); color: #000; font-weight: 600; }
.btn-green:hover { opacity: .85; }
.btn-red { color: var(--red); }
.btn-red:hover { background: rgba(248,81,73,.15); }

/* BANNERS */
.banner { border-radius: var(--r); padding: 10px 14px; margin-bottom: 14px; font-size: 13px; }
.banner-stale { background: rgba(88,166,255,.08); border: 1px solid rgba(88,166,255,.3); color: var(--blue); }
.banner-warn { background: rgba(219,109,40,.08); border: 1px solid rgba(219,109,40,.4); }
.banner-warn h3 { font-size: 12px; font-weight: 700; color: var(--orange); margin-bottom: 6px; }
.banner-crit { background: rgba(248,81,73,.08); border: 1px solid rgba(248,81,73,.4); }
.banner-crit h3 { font-size: 12px; font-weight: 700; color: var(--red); margin-bottom: 6px; }
.chips { display: flex; flex-wrap: wrap; gap: 5px; }
.chip { background: rgba(255,255,255,.06); padding: 2px 8px; border-radius: 12px; font-size: 11px; cursor: pointer; }
.chip:hover { background: rgba(255,255,255,.12); }

/* TOOLBAR */
.toolbar { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; align-items: center; }
.search { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--r); color: var(--text); font-size: 13px; padding: 6px 12px; flex: 1; min-width: 180px; }
.search:focus { outline: none; border-color: var(--blue); }

/* INVENTORY */
.inv-block { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); margin-bottom: 10px; overflow: hidden; }
.inv-hdr { padding: 10px 14px; background: var(--surface2); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; cursor: pointer; user-select: none; }
.inv-hdr:hover { background: var(--border); }
.inv-hdr-left { display: flex; align-items: center; gap: 10px; font-size: 13px; font-weight: 600; }
.inv-body { overflow-x: auto; }
table.inv { width: 100%; border-collapse: collapse; }
table.inv th { text-align: left; padding: 7px 12px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: var(--dim); border-bottom: 1px solid var(--border); white-space: nowrap; }
table.inv th[onclick] { cursor: pointer; user-select: none; }
table.inv th[onclick]:hover { color: var(--text); }
table.inv th.sort-active { color: var(--blue); }
table.inv td { padding: 5px 10px; border-bottom: 1px solid var(--border); vertical-align: middle; }
/* Sticky first column */
table.inv th:first-child { position: sticky; left: 0; z-index: 2; background: var(--surface2); box-shadow: 2px 0 6px rgba(0,0,0,.35); }
table.inv td:first-child { position: sticky; left: 0; z-index: 1; background: var(--surface); box-shadow: 2px 0 6px rgba(0,0,0,.35); }
table.inv tr.row-exp-soon td:first-child { background: #1e1b15; }
table.inv tr.row-exp-past td:first-child { background: #1d1517; }
table.inv tr:last-child td { border-bottom: none; }
table.inv tr:hover td { background: rgba(255,255,255,.02); }
table.inv tr.row-exp-soon td { background: rgba(219,109,40,.07); }
table.inv tr.row-exp-past td { background: rgba(248,81,73,.07); }
.item-name { font-size: 13px; }
.item-name.hidden { display: none; }
.item-qty { color: var(--dim); font-size: 12px; white-space: nowrap; }

/* STATUS BADGE */
.sb { display: inline-block; padding: 2px 9px; border-radius: 12px; font-size: 11px; font-weight: 700; cursor: pointer; user-select: none; white-space: nowrap; }
.sb:hover { opacity: .8; }
.sb.g { background: rgba(63,185,80,.15); color: var(--green); border: 1px solid rgba(63,185,80,.3); }
.sb.y { background: rgba(210,153,34,.15); color: var(--yellow); border: 1px solid rgba(210,153,34,.35); }
.sb.r { background: rgba(248,81,73,.15); color: var(--red); border: 1px solid rgba(248,81,73,.3); }

/* EXPIRY LABEL */
.exp { display: inline-block; font-size: 10px; padding: 1px 6px; border-radius: 4px; white-space: nowrap; }
.exp-past { background: rgba(248,81,73,.2); color: var(--red); font-weight: 600; }
.exp-today { background: rgba(219,109,40,.3); color: var(--orange); font-weight: 600; }
.exp-soon { background: rgba(219,109,40,.15); color: var(--orange); }
.exp-ok { color: var(--dim); }

/* INLINE EDIT */
.ie { background: var(--surface2); border: 1px solid var(--blue); border-radius: 4px; color: var(--text); font-size: 12px; padding: 3px 6px; width: 100%; min-width: 80px; }
.ie:focus { outline: none; }
.ie-date { min-width: 120px; }

/* PLAN TAB */
.plan-hdr { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
.week-lbl { font-size: 15px; font-weight: 600; min-width: 230px; text-align: center; }
.plan-wrap { overflow-x: auto; }
table.plan { width: 100%; border-collapse: collapse; min-width: 700px; }
table.plan th { padding: 8px; text-align: center; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--dim); background: var(--surface2); border: 1px solid var(--border); }
table.plan td { border: 1px solid var(--border); padding: 6px 8px; vertical-align: top; width: 13%; }
table.plan td.slot-lbl { background: var(--surface2); font-size: 11px; font-weight: 700; color: var(--dim); text-transform: uppercase; letter-spacing: .04em; white-space: nowrap; width: 9%; text-align: right; padding-right: 10px; }
.meal-cell { min-height: 38px; cursor: pointer; border-radius: 4px; padding: 3px; }
.meal-cell:hover { background: rgba(255,255,255,.05); }
.meal-cell.empty { display: flex; align-items: center; justify-content: center; color: var(--border); font-size: 20px; }
.meal-cell.empty:hover { color: var(--dim); }
.meal-nm { font-size: 12px; font-weight: 500; line-height: 1.3; }
.meal-ing { font-size: 10px; color: var(--dim); margin-top: 2px; }
.meal-cell.gen { background: rgba(88,166,255,.07); }
.meal-cell.uses-exp { background: rgba(219,109,40,.1); }
.meal-cell.issues { background: rgba(248,81,73,.13); border: 1px solid rgba(248,81,73,.22); }
.meal-cell.prepared { opacity: .5; }
.meal-cell.prepared .meal-nm { text-decoration: line-through; }
.meal-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 4px; min-height: 18px; }
.meal-issues-badge { font-size: 10px; color: var(--red); }
.prep-btn { background: rgba(63,185,80,.15); border: 1px solid rgba(63,185,80,.35); border-radius: 3px; color: var(--green); cursor: pointer; font-size: 10px; font-weight: 700; line-height: 1.4; padding: 1px 6px; white-space: nowrap; }
.prep-btn:hover { background: rgba(63,185,80,.3); }
.ing-list { list-style: none; font-size: 12px; padding: 0; }
.ing-list li { padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,.04); display: flex; align-items: center; gap: 7px; }
.ing-list li:last-child { border-bottom: none; }
.day-th.done { color: var(--green); text-decoration: line-through; }

/* SHOPPING */
.shop-sect { margin-bottom: 22px; }
.shop-sect h2 { font-size: 13px; font-weight: 700; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 6px; }
.shop-item { display: flex; align-items: center; gap: 10px; padding: 6px 4px; border-bottom: 1px solid rgba(255,255,255,.04); }
.shop-item:last-child { border-bottom: none; }
.shop-item label { cursor: pointer; font-size: 13px; flex: 1; }
.shop-item.chk label { text-decoration: line-through; color: var(--dim); }
.shop-item input[type=checkbox] { width: 14px; height: 14px; cursor: pointer; accent-color: var(--green); flex-shrink: 0; }
.shop-meta { font-size: 11px; color: var(--dim); }
.shop-empty { color: var(--dim); font-size: 13px; font-style: italic; padding: 8px 4px; }

/* RECIPES */
.rcat { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
.rcat-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; color: var(--dim); cursor: pointer; font-size: 12px; padding: 5px 14px; transition: all .15s; }
.rcat-btn:hover { color: var(--text); }
.rcat-btn.on { background: var(--blue); border-color: var(--blue); color: #000; font-weight: 600; }
.recipes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
.rcard { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; }
.rcard-hdr { padding: 12px 16px; background: var(--surface2); cursor: pointer; user-select: none; }
.rcard-hdr:hover { background: var(--border); }
.rcard-hdr h3 { font-size: 13px; font-weight: 600; }
.rcard-meta { font-size: 11px; color: var(--dim); margin-top: 3px; }
.rcard-body { padding: 14px 16px; display: none; }
.rcard-body.on { display: block; }
.rcard-body h4 { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--dim); margin: 12px 0 5px; }
.rcard-body h4:first-child { margin-top: 0; }
.rcard-body ul, .rcard-body ol { padding-left: 16px; font-size: 13px; }
.rcard-body li { margin-bottom: 3px; }
.rcard-body .note { font-size: 11px; color: var(--dim); margin-top: 8px; font-style: italic; }

/* MODAL */
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.75); z-index: 200; align-items: center; justify-content: center; }
.overlay.on { display: flex; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 22px; width: 460px; max-width: 96vw; max-height: 85vh; overflow-y: auto; }
.modal h2 { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
.fg { margin-bottom: 12px; }
.fg label { display: block; font-size: 11px; color: var(--dim); margin-bottom: 4px; text-transform: uppercase; letter-spacing: .05em; }
.fg input, .fg select, .fg textarea { background: var(--surface2); border: 1px solid var(--border); border-radius: 5px; color: var(--text); font-size: 13px; padding: 7px 10px; width: 100%; font-family: inherit; }
.fg input:focus, .fg select:focus, .fg textarea:focus { outline: none; border-color: var(--blue); }
.fg textarea { min-height: 70px; resize: vertical; }
.modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; border-top: 1px solid var(--border); padding-top: 14px; }
.fg-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

/* SOURCE TABS (add recipe modal) */
.src-tab { background: var(--surface2); border: none; color: var(--dim); cursor: pointer; flex: 1; font-size: 13px; padding: 9px; transition: all .15s; }
.src-tab:hover { color: var(--text); background: var(--border); }
.src-tab.on { background: var(--blue); color: #000; font-weight: 600; }
.src-badge { display: inline-block; font-size: 10px; padding: 1px 6px; border-radius: 4px; background: rgba(88,166,255,.15); color: var(--blue); margin-left: 4px; vertical-align: middle; }

/* EXPORT OPTIONS */
.export-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
.export-opt { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--r); color: var(--text); cursor: pointer; padding: 16px 12px; text-align: center; transition: border-color .15s, background .15s; }
.export-opt:hover { border-color: var(--blue); background: var(--border); }
.export-icon { font-size: 26px; margin-bottom: 6px; }
.export-lbl { font-size: 13px; font-weight: 600; margin-bottom: 3px; }
.export-desc { font-size: 11px; color: var(--dim); line-height: 1.3; }

@media (max-width: 640px) {
  main { padding: 12px; }
  /* Header: tabs scroll, sync button shrinks to dot only */
  .hdr { padding: 0 10px; gap: 4px; }
  .logo { font-size: 13px; }
  .tabs { overflow-x: auto; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
  .tabs::-webkit-scrollbar { display: none; }
  .tb { padding: 12px 10px; font-size: 12px; flex-shrink: 0; }
  #sync-label { display: none; }
  .sync-btn { padding: 5px 8px; flex-shrink: 0; }
  .fg-row { grid-template-columns: 1fr; }
  .export-grid { grid-template-columns: 1fr 1fr; }
}
/* SYNC */
.sync-btn { background: none; border: 1px solid var(--border); border-radius: 20px; color: var(--dim); cursor: pointer; font-size: 11px; padding: 4px 12px; white-space: nowrap; display: flex; align-items: center; gap: 5px; transition: all .15s; }
.sync-btn:hover { border-color: var(--blue); color: var(--blue); }
.sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--dim); flex-shrink: 0; }
.sync-dot.ok { background: var(--green); }
.sync-dot.syncing { background: var(--yellow); animation: pulse .8s infinite; }
.sync-dot.error { background: var(--red); }
.sync-dot.off { background: var(--dim); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
</style>
</head>
<body>

<div class="hdr">
  <div class="logo">🥗 Cocina</div>
  <nav class="tabs">
    <button class="tb on" onclick="TAB('inventario')">📦 Inventario</button>

    <button class="tb" onclick="TAB('mercado')">🛒 Mercado</button>
    <button class="tb" onclick="TAB('recetas')">📖 Recetas</button>
  </nav>
  <button class="sync-btn" onclick="openSyncConfig()" id="sync-btn">
    <span class="sync-dot off" id="sync-dot"></span>
    <span id="sync-label">☁️ Sync</span>
  </button>
</div>

// UTILITIES
// ─────────────────────────────────────────────
function uid() { return '_' + Math.random().toString(36).slice(2,9); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function getMonday(d) {
  const dt = new Date(d);
  const day = dt.getDay(); // 0=Sun
  const diff = day === 0 ? -6 : 1 - day;
  dt.setDate(dt.getDate() + diff);
  return fmtDate(dt);
}

function fmtDate(d) {
  const dt = typeof d === 'string' ? new Date(d+'T00:00:00') : new Date(d);
  return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0');
}

function addDays(dateStr, n) {
  const d = new Date(dateStr+'T00:00:00');
  d.setDate(d.getDate() + n);
  return fmtDate(d);
}

function displayShort(dateStr) { // "Lun 06/04"
  const d = new Date(dateStr+'T00:00:00');
  const days = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  return days[d.getDay()]+' '+String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0');
}

function displayWeek(mon) {
  const sun = addDays(mon, 6);
  const dm = new Date(mon+'T00:00:00'), ds = new Date(sun+'T00:00:00');
  const months = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  return `${dm.getDate()} ${months[dm.getMonth()]} – ${ds.getDate()} ${months[ds.getMonth()]} ${ds.getFullYear()}`;
}

function today() {
  return fmtDate(new Date());
}

function expiryInfo(item) {
  if (!item.e) return null;
  const now = new Date(); now.setHours(0,0,0,0);
  const exp = new Date(item.e+'T00:00:00');
  const days = Math.round((exp - now) / 86400000);
  if (days < 0) return { cls:'exp-past', label:`Venció hace ${-days}d` };
  if (days === 0) return { cls:'exp-today', label:'Vence hoy ⚠️' };
  const thresh = item.sec === 'despensa' ? 7 : 3;
  if (days <= thresh) return { cls:'exp-soon', label:`Vence en ${days}d` };
  return { cls:'exp-ok', label: item.e };
}

function statusClass(s) { return s==='g'?'g':s==='y'?'y':'r'; }
function statusLabel(s) { return s==='g'?'🟢 Lleno':s==='y'?'🟡 Medio':'🔴 Bajo'; }
function cycleStatus(s) { return s==='g'?'y':s==='y'?'r':'g'; }

function TAB(t) {
  S.tab = t;
  document.querySelectorAll('.tb').forEach(b => b.classList.toggle('on', b.textContent.toLowerCase().includes(t.slice(0,4))));
  document.querySelectorAll('.panel').forEach(p => p.classList.toggle('on', p.id === 'p-'+t));
  render();
}

function render() {
  if (S.tab === 'inventario') renderInventory();
  else if (S.tab === 'plan') renderPlan();
  else if (S.tab === 'mercado') renderMercado();
  else if (S.tab === 'recetas') renderRecetas();
}

// INVENTORY
// ─────────────────────────────────────────────
function thSort(label, key) {
  const active = S.invSort?.key === key;
  const arrow = active ? (S.invSort.dir === 1 ? ' ▲' : ' ▼') : '';
  return `<th class="${active?'sort-active':''}" onclick="setSort('${key}')">${label}${arrow}</th>`;
}

function setSort(key) {
  if (!S.invSort) S.invSort = { key, dir: 1 };
  else if (S.invSort.key === key) S.invSort.dir *= -1;
  else { S.invSort.key = key; S.invSort.dir = 1; }
  renderInvSections();
}

function sortItems(items) {
  if (!S.invSort) return items;
  const { key, dir } = S.invSort;
  const statusOrder = { g: 0, y: 1, r: 2 };
  return [...items].sort((a, b) => {
    let av, bv;
    if (key === 'e') {
      av = a.e ? new Date(a.e).getTime() : Infinity;
      bv = b.e ? new Date(b.e).getTime() : Infinity;
    } else if (key === 's') {
      av = statusOrder[a.s] ?? 0;
      bv = statusOrder[b.s] ?? 0;
    } else {
      av = (a[key] || '').toLowerCase();
      bv = (b[key] || '').toLowerCase();
    }
    return av < bv ? -dir : av > bv ? dir : 0;
  });
}

function renderInventory() {
  const el = document.getElementById('p-inventario');
  const now = new Date(); now.setHours(0,0,0,0);

  // Build expiry alerts
  const expPast = S.inv.filter(i => { if(!i.e) return false; const d=new Date(i.e+'T00:00:00'); return d<now; });
  const expSoon = S.inv.filter(i => {
    if(!i.e) return false;
    const d=new Date(i.e+'T00:00:00'); const days=Math.round((d-now)/86400000);
    const thresh = i.sec==='despensa'?7:3;
    return days>=0 && days<=thresh;
  });

  let html = '';

  // Stale banner
  if (S.invLastUpdated) {
    const staleDays = Math.round((now - new Date(S.invLastUpdated)) / 86400000);
    if (staleDays > 15) {
      html += `<div class="banner banner-stale">ℹ️ El inventario no se ha editado en <strong>${staleDays} días</strong>. ¿Todo sigue igual?</div>`;
    }
  }

  // Expiry banners
  if (expPast.length) {
    html += `<div class="banner banner-crit"><h3>🗑️ Vencidos (${expPast.length})</h3><div class="chips">${expPast.map(i=>`<span class="chip" onclick="jumpToItem('${i.id}')">${esc(i.n)}</span>`).join('')}</div></div>`;
  }
  if (expSoon.length) {
    html += `<div class="banner banner-warn"><h3>⚠️ Próximos a vencer (${expSoon.length})</h3><div class="chips">${expSoon.map(i=>`<span class="chip" onclick="jumpToItem('${i.id}')">${esc(i.n)} · ${expiryInfo(i).label}</span>`).join('')}</div></div>`;
  }

  // Toolbar
  html += `<div class="toolbar">
    <input class="search" type="text" placeholder="Buscar artículo…" value="${esc(S.search)}" oninput="onSearchInput(this)">
    <button class="btn btn-blue" onclick="openAddItem('congelador')">+ Añadir artículo</button>
    <button class="btn" onclick="exportMD()">⬇ Exportar .md</button>
  </div>
  <div id="inv-sections"></div>`;

  el.innerHTML = html;
  renderInvSections();
}

function onSearchInput(el) {
  S.search = el.value;
  renderInvSections();
}

  let html = '';

    const collapsed = S.collapsed[sec];
    const redCount = items.filter(i=>i.s==='r').length;

    html += `<div class="inv-block">
      <div class="inv-hdr" onclick="toggleSec('${sec}')">
        <div class="inv-hdr-left">
          <span>${SEC_LABELS[sec]}</span>
          <span style="color:var(--dim);font-weight:400">${items.length} artículos</span>
          ${redCount ? `<span style="color:var(--red);font-size:11px">${redCount} bajos</span>` : ''}
        </div>
        <span style="color:var(--dim);font-size:12px">${collapsed?'▶':'▼'}</span>
      </div>`;

    if (!collapsed) {
      html += `<div class="inv-body"><table class="inv">
        <thead><tr>
          ${thSort('Artículo','n')}${thSort('Cantidad','q')}${thSort('Estado','s')}${thSort('Vence','e')}${thSort('Nota','t')}<th></th>
        </tr></thead><tbody>`;

      for (const item of sortItems(items)) {
        const ei = expiryInfo(item);
        let rowCls = '';
        if (ei && ei.cls === 'exp-past') rowCls = 'row-exp-past';
        else if (ei && (ei.cls === 'exp-today' || ei.cls === 'exp-soon')) rowCls = 'row-exp-soon';

        const expHtml = ei
          ? `<span class="exp ${ei.cls}">${esc(ei.label)}</span>`
          : `<span class="exp exp-ok">—</span>`;

        html += `<tr class="${rowCls}" id="row-${item.id}">
          <td class="item-name">${esc(item.n)}</td>
          <td class="item-qty">${esc(item.q||'—')}</td>
          <td><span class="sb ${statusClass(item.s)}" onclick="cycleItemStatus('${item.id}')" title="Clic para cambiar">${statusLabel(item.s)}</span></td>
          <td>${expHtml}</td>
          <td style="color:var(--dim);font-size:12px;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(item.t||'')}</td>
          <td><button class="btn" style="padding:3px 8px;font-size:11px" onclick="openEditItem('${item.id}')">Editar</button></td>
        </tr>`;
      }

      if (!items.length) {
        html += `<tr><td colspan="6" style="color:var(--dim);font-size:12px;padding:12px">Sin resultados${q?' para "'+esc(q)+'"':''}</td></tr>`;
      }

      html += `</tbody></table></div>`;
    }
    html += `</div>`;
  }

  container.innerHTML = html;
}

function toggleSec(sec) { S.collapsed[sec] = !S.collapsed[sec]; renderInvSections(); }

function touchInv() { S.invLastUpdated = new Date().toISOString(); }

function cycleItemStatus(id) {
  const item = S.inv.find(i => i.id===id);
  if (!item) return;
  item.s = cycleStatus(item.s);
  touchInv(); save();
  renderInventory();

function jumpToItem(id) {

  if (row) { row.scrollIntoView({behavior:'smooth', block:'center'}); row.style.outline='2px solid var(--blue)'; setTimeout(()=>row.style.outline='',1500); }

// ─────────────────────────────────────────────
// PLAN
// ─────────────────────────────────────────────
function getWeekPlan(mon) {
  if (!S.plans[mon]) {
    S.plans[mon] = Array.from({length:7}, (_,i) => ({
      date: addDays(mon, i),
      done: false,
      meals: {ayuno:null,desayuno:null,mediaMañana:null,almuerzo:null,merienda:null,cena:null}
    }));
  }
  return S.plans[mon];
}

function renderPlan() {
  if (!S.curWeek) S.curWeek = getMonday(new Date());
  const plan = getWeekPlan(S.curWeek);
  const todayStr = today();
  const el = document.getElementById('p-plan');

  let html = `<div class="plan-hdr">
    <div class="week-nav">
      <button class="btn" onclick="prevWeek()">◀</button>
      <div class="week-lbl">${displayWeek(S.curWeek)}</div>
      <button class="btn" onclick="nextWeek()">▶</button>
    </div>
    <button class="btn" onclick="goToday()">Hoy</button>
    <button class="btn btn-green" onclick="generatePlan()">✨ Generar semana</button>
    <button class="btn" onclick="clearPlan()">Limpiar</button>
    <button class="btn" onclick="openExportPlan()">📤 Exportar plan</button>
  </div>
  <p style="color:var(--dim);font-size:12px;margin-bottom:14px">Clic en la celda para editar. Botón <strong style="color:var(--green)">✓ Preparar</strong> descuenta los ingredientes del inventario. Fondo <span style="color:var(--red)">rojo</span> = faltan ingredientes.</p>
  <div class="plan-wrap"><table class="plan">
  <thead><tr><th style="text-align:right;padding-right:10px;background:var(--surface2)">Momento</th>`;

  plan.forEach(day => {
    const isToday = day.date === todayStr;
    html += `<th class="day-th ${day.done?'done':''}" style="${isToday?'color:var(--blue)':''}">
      <div>${displayShort(day.date)}</div>
      <div style="margin-top:3px">
        <span class="sb ${day.done?'g':'y'}" style="cursor:pointer;font-size:10px" onclick="toggleDone('${S.curWeek}',${plan.indexOf(day)})">${day.done?'✅ Hecho':'⬜ Pendiente'}</span>
      </div>
    </th>`;
  });
  html += `</tr></thead><tbody>`;

  for (const mk of MEAL_KEYS) {
    html += `<tr><td class="slot-lbl">${MEAL_LABELS[mk]}</td>`;
    plan.forEach((day, di) => {
      const meal = day.meals[mk];
      if (meal) {
        const chk = checkMealIngredients(meal);
        const issueCount = chk ? chk.missing.length + chk.low.length : 0;
        let cellCls = meal.prepared ? 'prepared' : issueCount > 0 ? 'issues' : meal.usesExp ? 'uses-exp' : 'gen';
        html += `<td>
          <div class="meal-cell ${cellCls}" onclick="openMealEdit('${S.curWeek}',${di},'${mk}')">
            <div class="meal-nm">${esc(meal.name)}</div>
            ${meal.notes ? `<div class="meal-ing">${esc(meal.notes)}</div>` : ''}
            <div class="meal-footer">
              <span class="meal-issues-badge">${meal.prepared ? '✅' : issueCount > 0 ? `⚠️ ${issueCount} falta${issueCount>1?'n':''}` : ''}</span>
              ${!meal.prepared && meal.recipeId ? `<button class="prep-btn" onclick="event.stopPropagation();openQuickPrep('${S.curWeek}',${di},'${mk}')">✓ Preparar</button>` : ''}
            </div>
          </div>
        </td>`;
      } else {
        html += `<td onclick="openMealEdit('${S.curWeek}',${di},'${mk}')"><div class="meal-cell empty">+</div></td>`;
      }
    });
    html += `</tr>`;
  }

  html += `</tbody></table></div>`;
  el.innerHTML = html;
}

function prevWeek() { S.curWeek = addDays(S.curWeek, -7); save(); renderPlan(); }
function nextWeek() { S.curWeek = addDays(S.curWeek, 7); save(); renderPlan(); }
function goToday() { S.curWeek = getMonday(new Date()); save(); renderPlan(); }

function toggleDone(mon, di) {
  const plan = getWeekPlan(mon);
  plan[di].done = !plan[di].done;
  save(); renderPlan();
}

function clearPlan() {
  if (!confirm('¿Borrar todo el plan de esta semana?')) return;
  delete S.plans[S.curWeek];
  save(); renderPlan();
}

function openMealEdit(mon, di, mk) {
  const plan = getWeekPlan(mon);
  const day = plan[di];
  const meal = day.meals[mk];
  const recs = [...RECIPES, ...(S.customRecipes||[])].filter(r => r.cat === mk);
  const chk = meal ? checkMealIngredients(meal) : null;

  let recOpts = `<option value="">— Sin comida —</option>`;
  recs.forEach(r => {
    const sel = meal && meal.recipeId === r.id ? 'selected' : '';
    recOpts += `<option value="${r.id}" ${sel}>${esc(r.name)}</option>`;
  });

  let ingHtml = '';
  if (chk) {
    ingHtml = `<div class="fg"><label>Ingredientes en inventario</label><ul class="ing-list">`;
    chk.ok.forEach(i      => ingHtml += `<li><span>✅</span><span>${esc(i)}</span></li>`);
    chk.low.forEach(i     => ingHtml += `<li><span>⚠️</span><span style="color:var(--yellow)">${esc(i)}</span><span style="color:var(--dim);font-size:11px">— 🔴 Bajo</span></li>`);
    chk.missing.forEach(i => ingHtml += `<li><span>❌</span><span style="color:var(--red)">${esc(i)}</span><span style="color:var(--dim);font-size:11px">— No en inventario</span></li>`);
    ingHtml += `</ul></div>`;
    if (chk.missing.length || chk.low.length) {
      window._pendingMissing = chk.missing;
      ingHtml += `<button class="btn" style="margin-bottom:12px;width:100%" onclick="addMissingToInventory()">➕ Agregar faltantes al inventario como 🔴</button>`;
    }
  }

  openModal(`<h2>${MEAL_LABELS[mk]} · ${displayShort(day.date)}</h2>
    <div class="fg"><label>Receta guardada</label>
      <select id="me-rid" onchange="prefillMealName()">${recOpts}</select>
    </div>
    <div class="fg"><label>O escribe el nombre del plato</label>
      <input id="me-name" type="text" value="${esc(meal?meal.name:'')}" placeholder="Nombre libre…">
    </div>
    <div class="fg"><label>Notas / ingredientes clave</label>
      <textarea id="me-notes" placeholder="Opcional">${esc(meal?meal.notes||'':'')}</textarea>
    </div>
    ${ingHtml}
    <div class="modal-footer" style="flex-wrap:wrap">
      ${meal ? `<button class="btn btn-red" onclick="clearMeal('${mon}',${di},'${mk}')">Quitar</button>` : ''}
      ${meal?.recipeId && !meal?.prepared ? `<button class="btn btn-green" onclick="openQuickPrep('${mon}',${di},'${mk}')">✅ Marcar preparada</button>` : ''}
      ${meal?.prepared ? `<button class="btn" onclick="unmarkPrepared('${mon}',${di},'${mk}')">↩️ Desmarcar</button>` : ''}
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-blue" onclick="saveMeal('${mon}',${di},'${mk}')">Guardar</button>
    </div>`);
}

function prefillMealName() {
  const rid = document.getElementById('me-rid').value;
  if (!rid) return;
  const rec = RECIPES.find(r => r.id===rid);
  if (rec) document.getElementById('me-name').value = rec.name;
}

function saveMeal(mon, di, mk) {
  const plan = getWeekPlan(mon);
  const name = document.getElementById('me-name').value.trim();
  const rid = document.getElementById('me-rid').value;
  const notes = document.getElementById('me-notes').value.trim();
  if (!name) { plan[di].meals[mk] = null; }
  else { plan[di].meals[mk] = { name, recipeId: rid||null, notes }; }
  save(); closeModal(); renderPlan();
}

function clearMeal(mon, di, mk) {
  const plan = getWeekPlan(mon);
  plan[di].meals[mk] = null;
  save(); closeModal(); renderPlan();
}

// ─── PREPARE MEAL ────────────────────────────
function openQuickPrep(mon, di, mk) {
  const plan = getWeekPlan(mon);
  const meal = plan[di].meals[mk];
  if (!meal) return;
  const chk = checkMealIngredients(meal);
  const rec = chk?.recipe;

  let ingRows = '';
  if (rec) {
    rec.ing.forEach(ing => {
      const item = findInvMatch(ing);
      if (!item) {
        ingRows += `<li><span>❌</span><span style="color:var(--red)">${esc(ing)}</span><span style="color:var(--dim);font-size:11px">No en inventario</span></li>`;
      } else if (item.s === 'r') {
        ingRows += `<li><span>⚠️</span><span style="color:var(--yellow)">${esc(ing)}</span><span style="color:var(--dim);font-size:11px">Ya en 🔴 Bajo — no cambia</span></li>`;
      } else {
        ingRows += `<li><span>✅</span><span>${esc(ing)}</span><span style="color:var(--dim);font-size:11px">${statusLabel(item.s)} → ${statusLabel(cycleStatus(item.s))}</span></li>`;
      }
    });
  }

  let missingNote = '';
  if (chk?.missing.length) {
    window._pendingMissing = chk.missing;
    missingNote = `<div style="background:rgba(248,81,73,.1);border:1px solid rgba(248,81,73,.25);border-radius:6px;padding:10px;margin:12px 0;font-size:12px">
      <strong style="color:var(--red)">❌ Sin inventario: ${chk.missing.map(i=>esc(i)).join(', ')}</strong>
      <br><button class="btn" style="margin-top:8px;font-size:11px" onclick="addMissingToInventory()">➕ Agregar al inventario como 🔴</button>
    </div>`;
  }

  openModal(`<h2>✅ Preparar: ${esc(meal.name)}</h2>
    <p style="color:var(--dim);font-size:12px;margin-bottom:10px">Al confirmar, se actualizará el inventario:</p>
    ${rec ? `<ul class="ing-list">${ingRows}</ul>` : '<p style="color:var(--dim);font-size:12px">Sin receta vinculada — no se modifica el inventario.</p>'}
    ${missingNote}
    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-green" onclick="confirmPrep('${mon}',${di},'${mk}')">✅ Confirmar preparada</button>
    </div>`);
}

function confirmPrep(mon, di, mk) {
  const plan = getWeekPlan(mon);
  const meal = plan[di].meals[mk];
  if (!meal) return;
  const chk = checkMealIngredients(meal);
  if (chk?.recipe) {
    chk.recipe.ing.forEach(ing => {
      const item = findInvMatch(ing);
      if (item && item.s !== 'r') item.s = cycleStatus(item.s);
    });
    touchInv();
  }
  meal.prepared = true;
  save(); closeModal(); renderPlan();
  showToast('✅ Preparada — inventario actualizado');
}

function unmarkPrepared(mon, di, mk) {
  const plan = getWeekPlan(mon);
  const meal = plan[di].meals[mk];
  if (meal) { meal.prepared = false; save(); closeModal(); renderPlan(); }
}

function addMissingToInventory() {
  const items = window._pendingMissing || [];
  if (!items.length) return;
  let added = 0;
  items.forEach(name => {
    const existing = findInvMatch(name);
    if (existing) { existing.s = 'r'; }
    else { S.inv.push({ id: uid(), n: name, q: '—', s: 'r', e: null, t: 'Falta para receta', sec: 'nevera' }); added++; }
  });
  touchInv(); save();
  showToast(`➕ Ingredientes agregados al inventario como 🔴`);
  renderInvSections();
}

// ─── EXPORT PLAN ─────────────────────────────
function openExportPlan() {
  openModal(`<h2>📤 Exportar plan semanal</h2>
    <p style="color:var(--dim);font-size:12px;margin-bottom:14px">${displayWeek(S.curWeek)}</p>
    <div class="export-grid">
      <button class="export-opt" onclick="exportPlanText()">
        <div class="export-icon">📋</div><div class="export-lbl">Texto</div>
        <div class="export-desc">Copia al portapapeles</div>
      </button>
      <button class="export-opt" onclick="exportPlanCSV()">
        <div class="export-icon">📊</div><div class="export-lbl">CSV</div>
        <div class="export-desc">Abre en Excel / Numbers</div>
      </button>
      <button class="export-opt" onclick="exportPlanPDF()">
        <div class="export-icon">🖨️</div><div class="export-lbl">PDF / Imprimir</div>
        <div class="export-desc">Abre diálogo de impresión</div>
      </button>
      <button class="export-opt" onclick="exportPlanShare()" ${!navigator.share?'style="opacity:.4;cursor:not-allowed"':''}>
        <div class="export-icon">📲</div><div class="export-lbl">Compartir</div>
        <div class="export-desc">${navigator.share?'Hoja nativa del sistema':'No disponible'}</div>
      </button>
    </div>
    <div class="modal-footer"><button class="btn" onclick="closeModal()">Cerrar</button></div>`);
}

function buildPlanText() {
  const plan = getWeekPlan(S.curWeek);
  let text = `📅 Plan — ${displayWeek(S.curWeek)}\n`;
  plan.forEach(day => {
    const hasMeals = MEAL_KEYS.some(mk => day.meals[mk]);
    if (!hasMeals) return;
    text += `\n${displayShort(day.date).toUpperCase()}${day.done?' ✅':''}\n`;
    MEAL_KEYS.forEach(mk => {
      const m = day.meals[mk];
      if (m) text += `  ${MEAL_LABELS[mk]}: ${m.name}${m.prepared?' ✅':''}\n`;
    });
  });
  return text.trim();
}

function buildPlanCSV() {
  const plan = getWeekPlan(S.curWeek);
  let csv = 'Día,Fecha,' + MEAL_KEYS.map(k => MEAL_LABELS[k]).join(',') + '\n';
  plan.forEach(day => {
    const d = new Date(day.date+'T00:00:00');
    const names = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
    csv += [names[d.getDay()], day.date, ...MEAL_KEYS.map(mk => {
      const m = day.meals[mk]; return m ? `"${m.name.replace(/"/g,'""')}"` : '';
    })].join(',') + '\n';
  });
  return csv;
}

async function exportPlanText() {
  const text = buildPlanText();
  try { await navigator.clipboard.writeText(text); closeModal(); showToast('✅ Copiado al portapapeles'); }
  catch(e) {
    document.getElementById('modal-body').innerHTML = `<h2>📋 Plan como texto</h2>
      <textarea onclick="this.select()" style="background:var(--surface2);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:12px;height:280px;padding:10px;width:100%;font-family:monospace;resize:vertical">${esc(text)}</textarea>
      <div class="modal-footer"><button class="btn" onclick="closeModal()">Cerrar</button></div>`;
  }
}

function exportPlanCSV() {
  const blob = new Blob(['\uFEFF'+buildPlanCSV()], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `plan_${S.curWeek}.csv`;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
  closeModal(); showToast('✅ Descargando CSV…');
}

function exportPlanPDF() {
  const plan = getWeekPlan(S.curWeek);
  let rows = `<tr><th>Momento</th>${plan.map(d=>`<th>${displayShort(d.date)}</th>`).join('')}</tr>`;
  MEAL_KEYS.forEach(mk => {
    rows += `<tr><td class="slot">${MEAL_LABELS[mk]}</td>${plan.map(day => {
      const m = day.meals[mk]; return `<td>${m ? esc(m.name) : ''}</td>`;
    }).join('')}</tr>`;
  });
  const win = window.open('','_blank','width=900,height=600');

// ─── GENERATE PLAN ───────────────────────────
function findInvMatch(ingName) {
  const ing = ingName.toLowerCase().trim();
  return S.inv.find(item => {
    const nm = item.n.toLowerCase();
    return nm.includes(ing) || ing.includes(nm.split(' ')[0]);
  });
}

function checkMealIngredients(meal) {
  if (!meal?.recipeId) return null;
  const rec = [...RECIPES, ...(S.customRecipes||[])].find(r => r.id === meal.recipeId);
  if (!rec) return null;
  const missing = [], low = [], ok = [];
  rec.ing.forEach(ing => {
    const item = findInvMatch(ing);
    if (!item) missing.push(ing);
    else if (item.s === 'r') low.push(ing);
    else ok.push(ing);
  });
  return { missing, low, ok, recipe: rec };
}

function generatePlan() {
  const now = new Date(); now.setHours(0,0,0,0);

  function findItem(ingName) { return findInvMatch(ingName); }
  }

  function scoreRecipe(rec) {
    let score = 10;
    for (const ing of rec.ing) {
      const item = findItem(ing);
      if (!item) continue;
      if (item.s === 'r') score -= 3;
      else if (item.s === 'y') score += 1;
      else score += 2;
      if (item.e) {
        const d = new Date(item.e+'T00:00:00');
        const days = Math.round((d - now) / 86400000);
        if (days >= 0 && days <= 7) score += 8;
        if (days >= 0 && days <= 2) score += 8;
      }
    }
    return score;
  }

  function usesExpiring(rec) {
    for (const ing of rec.ing) {
      const item = findItem(ing);
      if (item && item.e) {
        const d = new Date(item.e+'T00:00:00');
        const days = Math.round((d - now) / 86400000);
        if (days >= 0 && days <= 7) return true;
      }
    }
    return false;
  }

  function best(cat) {
    const pool = RECIPES.filter(r => r.cat === cat);
    const scored = pool.map(r => ({...r, score: scoreRecipe(r)})).sort((a,b) => b.score-a.score);
    return scored.filter(r => r.score > 4);
  }

  const pools = {};
  for (const mk of MEAL_KEYS) pools[mk] = best(mk);

  const plan = getWeekPlan(S.curWeek);

  plan.forEach((day, di) => {
    for (const mk of MEAL_KEYS) {
      if (day.meals[mk]) continue; // don't overwrite existing
      const pool = pools[mk];
      if (!pool.length) continue;
      const rec = pool[di % pool.length];
      day.meals[mk] = {
        name: rec.name,
        recipeId: rec.id,
        notes: rec.ing.slice(0,4).join(', '),
        usesExp: usesExpiring(rec)
      };
    }
  });

  save(); renderPlan();
}

function renderMercado() {
  const el = document.getElementById('p-mercado');
  const now = new Date(); now.setHours(0,0,0,0);

  const urgent = S.inv.filter(i => i.s === 'r');
  const expiring = S.inv.filter(i => {
    if (i.s === 'r' || !i.e) return false;
    const d = new Date(i.e+'T00:00:00');
    const days = Math.round((d - now) / 86400000);
    return days >= 0 && days <= 7;
  }).sort((a,b) => new Date(a.e) - new Date(b.e));
  const optional = S.inv.filter(i => i.s === 'y' && !expiring.includes(i));

  function listItems(items, prefix) {
    if (!items.length) return `<div class="shop-empty">Ninguno</div>`;
    return items.map(item => {
      const key = prefix + item.id;
      const chk = S.shopChk[key];
      return `<div class="shop-item ${chk?'chk':''}">
        <input type="checkbox" id="chk-${key}" ${chk?'checked':''} onchange="toggleShopChk('${key}')">

        ${item.e ? `<span class="exp ${expiryInfo(item)?expiryInfo(item).cls:''}">${expiryInfo(item)?expiryInfo(item).label:''}</span>` : ''}
      </div>`;
    }).join('');
  }

  let html = `<div class="toolbar">

    <button class="btn" onclick="clearShopChk()">Desmarcar todo</button>

function buildShoppingText() {
  const now = new Date(); now.setHours(0,0,0,0);
  const urgent   = S.inv.filter(i => i.s === 'r');
  const expiring = S.inv.filter(i => {
    if (i.s==='r'||!i.e) return false;
    const d=new Date(i.e+'T00:00:00'); const days=Math.round((d-now)/86400000);
    return days>=0 && days<=7;
  }).sort((a,b)=>new Date(a.e)-new Date(b.e));
  const optional = S.inv.filter(i => i.s==='y' && !expiring.find(x=>x.id===i.id));
  const date = new Date().toLocaleDateString('es-CO',{day:'2-digit',month:'long',year:'numeric'});
  let t = `🛒 Lista de Mercado — ${date}\n`;
  if (urgent.length)   { t+=`\n🔴 URGENTE\n`; urgent.forEach(i=>t+=`☐ ${i.n}\n`); }
  if (expiring.length) { t+=`\n⚠️ POR VENCER\n`; expiring.forEach(i=>t+=`☐ ${i.n} (vence ${i.e})\n`); }
  if (optional.length) { t+=`\n🟡 OPCIONALES\n`; optional.forEach(i=>t+=`☐ ${i.n}\n`); }
  return t.trim();
}

function buildShoppingCSV() {
  const now = new Date(); now.setHours(0,0,0,0);
  const urgent   = S.inv.filter(i=>i.s==='r').map(i=>({...i,cat:'Urgente'}));
  const expiring = S.inv.filter(i=>{
    if(i.s==='r'||!i.e) return false;
    const d=new Date(i.e+'T00:00:00'); return Math.round((d-now)/86400000)<=7 && d>=now;
  }).map(i=>({...i,cat:'Por vencer'}));
  const optional = S.inv.filter(i=>i.s==='y'&&!expiring.find(x=>x.id===i.id)).map(i=>({...i,cat:'Opcional'}));
  let csv = 'Artículo,Sección,Categoría,Fecha vencimiento\n';
  [...urgent,...expiring,...optional].forEach(i=>{
    csv+=`"${i.n}","${SEC_LABELS[i.sec].replace(/[^\w\sáéíóúñÁÉÍÓÚÑ]/g,'').trim()}","${i.cat}","${i.e||''}"\n`;
  });
  return csv;
}

function previewImg(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const preview = document.getElementById('rec-img-preview');
    preview.src = e.target.result;
    preview.style.display = 'block';
    resizeImage(e.target.result, 900, data => { window._recImgData = data; });
  };
  reader.readAsDataURL(file);
}

function resizeImage(dataUrl, maxW, cb) {
  const img = new Image();
  img.onload = () => {
    const canvas = document.createElement('canvas');
    const scale = Math.min(1, maxW / img.width);
    canvas.width = Math.round(img.width * scale);
    canvas.height = Math.round(img.height * scale);
    canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
    cb(canvas.toDataURL('image/jpeg', 0.78));
  };
  img.src = dataUrl;
}

function parseAndFill() {
  const raw = (document.getElementById('rec-rawtext').value || '').trim();
  if (!raw) return;
  const lines = raw.split('\n').map(l => l.trim()).filter(l => l);
  let name = '', ings = [], steps = [], mode = 'header';

  for (const line of lines) {
    const ll = line.toLowerCase();
    if (/^ingredientes?:?\s*$/.test(ll)) { mode = 'ing'; continue; }
    if (/^(preparaci[oó]n|instrucciones?|pasos?|m[eé]todo|elaboraci[oó]n):?\s*$/.test(ll)) { mode = 'steps'; continue; }
    if (mode === 'header') {
      if (!name) { name = line.replace(/^#+\s*/, ''); }
      continue;
    }
    const clean = line.replace(/^[-•*]\s*/, '').replace(/^\d+[.)]\s*/, '').trim();
    if (!clean) continue;
    if (mode === 'ing') ings.push(clean);
    else if (mode === 'steps') steps.push(clean);
  }

  if (name) document.getElementById('rec-name').value = name;
  if (ings.length) document.getElementById('rec-ing').value = ings.join('\n');
  if (steps.length) document.getElementById('rec-steps').value = steps.join('\n');

  if (!name && !ings.length && !steps.length) {
    alert('No se pudo interpretar el texto. Intenta con el formato:\nNombre\n\nIngredientes:\n- item\n\nPreparación:\n1. paso');
  }
}

  const ingsRaw = document.getElementById('rec-ing').value.trim();
  const stepsRaw = document.getElementById('rec-steps').value.trim();
  const urlEl = document.getElementById('rec-url');

  const rec = {
    id: uid(),
    cat: document.getElementById('rec-cat').value,
    name,
    time: document.getElementById('rec-time').value.trim() || '—',
    srv: parseInt(document.getElementById('rec-srv').value) || 1,
    ing: ingsRaw ? ingsRaw.split('\n').map(l => l.trim()).filter(Boolean) : [],
    steps: stepsRaw ? stepsRaw.split('\n').map(l => l.trim()).filter(Boolean) : [],
    note: document.getElementById('rec-note').value.trim(),
    source: window._recSrc || 'texto',
    imageData: window._recImgData || null,
    url: urlEl ? urlEl.value.trim() : null,
  };

  if (!S.customRecipes) S.customRecipes = [];
  S.customRecipes.push(rec);
  window._recImgData = null;
  save();
  closeModal();
  S.recCat = rec.cat;
  renderRecetas();
}

function deleteCustomRecipe(id) {
  if (!confirm('¿Eliminar esta receta?')) return;
  S.customRecipes = (S.customRecipes || []).filter(r => r.id !== id);
  save();
  renderRecetas();
}

// ─────────────────────────────────────────────
// MODAL
// ─────────────────────────────────────────────
function openModal(html) {
  document.getElementById('modal-body').innerHTML = html;
  document.getElementById('overlay').classList.add('on');
  // autofocus
  setTimeout(() => { const f = document.querySelector('.modal input, .modal textarea'); if(f) f.focus(); }, 50);
}
function closeModal() { document.getElementById('overlay').classList.remove('on'); }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ─────────────────────────────────────────────
// EXPORT MARKDOWN
// ─────────────────────────────────────────────
function exportMD() {
  const now = new Date();
  const dateStr = fmtDate(now);
  let md = `# Inventario de Cocina\n\n> Actualizado: ${dateStr} | Estados: 🔴 Bajo · 🟡 Medio · 🟢 Lleno\n\n---\n\n`;

  for (const sec of SECTIONS) {
    md += `## ${SEC_LABELS[sec]}\n\n| Artículo | Cantidad | Estado | Vence | Nota |\n|----------|----------|--------|-------|------|\n`;
    S.inv.filter(i => i.sec === sec).forEach(item => {
      const sLabel = item.s==='g'?'🟢':item.s==='y'?'🟡':'🔴';
      md += `| ${item.n} | ${item.q||'—'} | ${sLabel} | ${item.e||'—'} | ${item.t||''} |\n`;
    });
    md += `\n---\n\n`;
  }

  openModal(`<h2>⬇ Exportar inventario.md</h2>
    <p style="color:var(--dim);font-size:12px;margin-bottom:12px">Copia este contenido y pégalo en <code>inventario.md</code></p>
    <textarea style="background:var(--surface2);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:11px;font-family:monospace;height:320px;padding:10px;width:100%;resize:vertical">${esc(md)}</textarea>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">Cerrar</button>
      <button class="btn btn-blue" onclick="copyMD()">Copiar</button>
    </div>`);
}

function copyMD() {
  const ta = document.querySelector('.overlay textarea');
  if (ta) { ta.select(); document.execCommand('copy'); }
}

// ─────────────────────────────────────────────
// SYNC — GitHub Gist
// ─────────────────────────────────────────────
let _syncCfg = null;
let _syncTimer = null;
const GIST_FILE = 'cocina_state.json';

function loadSyncCfg() {
  try { _syncCfg = JSON.parse(localStorage.getItem('cocina_sync') || 'null'); } catch(e) { _syncCfg = null; }
}
function saveSyncCfg(cfg) {
  _syncCfg = cfg;
  localStorage.setItem('cocina_sync', cfg ? JSON.stringify(cfg) : 'null');
}

function setSyncStatus(state, text) {
  const dot = document.getElementById('sync-dot');
  const lbl = document.getElementById('sync-label');
  if (!dot || !lbl) return;
  dot.className = 'sync-dot ' + state;
  lbl.textContent = text || (state === 'ok' ? '☁️ Sincronizado' : state === 'syncing' ? '☁️ Sincronizando…' : state === 'error' ? '⚠️ Error sync' : '☁️ Sync');
}

function schedulePush() {
  if (!_syncCfg) return;
  clearTimeout(_syncTimer);
  _syncTimer = setTimeout(pushToGist, 2500);
}

async function pushToGist() {
  if (!_syncCfg) return;
  setSyncStatus('syncing');
  try {
    const res = await fetch(`https://api.github.com/gists/${_syncCfg.gistId}`, {
      method: 'PATCH',
      headers: { 'Authorization': `token ${_syncCfg.token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ files: { [GIST_FILE]: { content: JSON.stringify(S) } } })
    });
    if (!res.ok) throw new Error(res.status);
    setSyncStatus('ok', '☁️ Guardado');
    setTimeout(() => setSyncStatus('ok', '☁️ Sync'), 3000);
  } catch(e) {
    setSyncStatus('error', '⚠️ Sin guardar');
  }
}

async function pullFromGist(silent) {
  if (!_syncCfg) return;
  if (!silent) setSyncStatus('syncing', '☁️ Descargando…');
  try {
    const res = await fetch(`https://api.github.com/gists/${_syncCfg.gistId}`, {
      headers: { 'Authorization': `token ${_syncCfg.token}` }
    });
    if (!res.ok) throw new Error(res.status);
    const data = await res.json();
    const content = data.files[GIST_FILE]?.content;
    if (content) {
      const remote = JSON.parse(content);
      Object.assign(S, remote);
      try { localStorage.setItem('cocina_v2', JSON.stringify(S)); } catch(e){}
    }
    setSyncStatus('ok', '☁️ Sync');
    return true;
  } catch(e) {
    setSyncStatus('error', '⚠️ Error sync');
    return false;
  }
}

async function createGist(token) {
  const res = await fetch('https://api.github.com/gists', {
    method: 'POST',
    headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({
      description: '🥗 Sistema de Cocina — Estado',
      public: false,
      files: { [GIST_FILE]: { content: JSON.stringify(S) } }
    })
  });
  if (!res.ok) throw new Error('No se pudo crear el Gist. Verifica el token.');
  const data = await res.json();
  return data.id;
}

function openSyncConfig() {
  const cfg = _syncCfg;
  openModal(`<h2>☁️ Sincronización entre dispositivos</h2>
    <p style="color:var(--dim);font-size:12px;margin-bottom:16px;line-height:1.6">
      Usa un <strong style="color:var(--text)">GitHub Gist privado</strong> como base de datos. Tus cambios se guardan automáticamente y están disponibles en cualquier dispositivo.
    </p>
    <div class="fg">
      <label>Personal Access Token de GitHub</label>
      <input id="sy-token" type="password" placeholder="ghp_xxxxxxxxxxxx" value="${cfg ? '••••••••••••' : ''}">
      <div style="font-size:11px;color:var(--dim);margin-top:4px">
        Ve a <strong>github.com → Settings → Developer settings → Personal access tokens → Tokens (classic)</strong> y crea uno con scope <code style="background:var(--surface2);padding:1px 4px;border-radius:3px">gist</code>.
      </div>
    </div>
    <div class="fg">
      <label>Gist ID <span style="font-weight:400;text-transform:none">(se llena automáticamente al crear)</span></label>
      <input id="sy-gist" type="text" placeholder="a1b2c3d4e5f6…" value="${cfg ? cfg.gistId : ''}">
    </div>
    <div style="background:var(--surface2);border-radius:var(--r);padding:12px;margin-bottom:12px;font-size:12px;color:var(--dim)">
      <strong style="color:var(--text)">Pasos rápidos:</strong><br>
      1. Crea el token con scope <code>gist</code><br>
      2. Pégalo arriba y pulsa <strong>Crear Gist</strong><br>
      3. El Gist ID se llena solo — guarda y listo
    </div>
    <div class="modal-footer" style="flex-wrap:wrap;gap:8px">
      ${cfg ? `<button class="btn btn-red" onclick="disconnectSync()">Desconectar</button>` : ''}
      ${cfg ? `<button class="btn" onclick="closeModal();pullFromGist().then(()=>render())">🔄 Sincronizar ahora</button>` : ''}
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-blue" onclick="doCreateGist()">Crear Gist nuevo</button>
      <button class="btn btn-green" onclick="saveSync()">Guardar configuración</button>
    </div>`);
}

async function doCreateGist() {
  const token = document.getElementById('sy-token').value.trim();
  if (!token || token.startsWith('•')) { alert('Pega tu token de GitHub primero.'); return; }
  const btn = event.target; btn.textContent = 'Creando…'; btn.disabled = true;
  try {
    const id = await createGist(token);
    document.getElementById('sy-gist').value = id;
    btn.textContent = '✅ Gist creado';
  } catch(e) {
    alert(e.message);
    btn.textContent = 'Crear Gist nuevo'; btn.disabled = false;
  }
}

function saveSync() {
  const rawToken = document.getElementById('sy-token').value.trim();
  const gistId = document.getElementById('sy-gist').value.trim();
  if (!gistId) { alert('Falta el Gist ID.'); return; }
  const token = rawToken.startsWith('•') ? _syncCfg?.token : rawToken;
  if (!token) { alert('Pega el token de GitHub.'); return; }
  saveSyncCfg({ token, gistId });
  closeModal();
  setSyncStatus('ok', '☁️ Sync');
  pushToGist();
}

function disconnectSync() {
  if (!confirm('¿Desconectar la sincronización? Tus datos locales no se borran.')) return;
  saveSyncCfg(null);
  closeModal();
  setSyncStatus('off', '☁️ Sync');
}

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
loadSyncCfg();
load();
if (!S.curWeek) S.curWeek = getMonday(new Date());
if (_syncCfg) {
  setSyncStatus('syncing', '☁️ Sincronizando…');
  pullFromGist(true).then(() => render());
} else {
  render();
}

// Auto-pull when the user returns to this tab/window
let _lastPull = Date.now();
function maybePull() {
  if (!_syncCfg) return;
  if (Date.now() - _lastPull < 10000) return; // no más de una vez cada 10s
  _lastPull = Date.now();
  pullFromGist(true).then(ok => { if (ok) render(); });
}
document.addEventListener('visibilitychange', () => { if (!document.hidden) maybePull(); });
window.addEventListener('focus', maybePull);
</script>
</body>
